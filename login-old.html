<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Thana Restaurant</title>
    <link rel="stylesheet" href="theme-v2.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: #0a0b0f;
        }
        .login-container { max-width: 420px; width: 100%; text-align: center; }
        .login-card {
            background: #161820;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 18px;
            padding: 28px 22px;
        }
        .login-logo { font-size: 52px; margin-bottom: 6px; }
        .login-title { font-size: 24px; font-weight: 800; color: #d4a853; }
        .login-subtitle { color: #a8a49e; font-size: 12px; margin: 6px 0 18px; }

        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }
        .role-card {
            background: rgba(255,255,255,0.02);
            border: 2px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 12px 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .role-card.selected {
            border-color: #d4a853;
            background: rgba(212,168,83,0.08);
        }
        .role-card .role-icon { font-size: 26px; display: block; }
        .role-card .role-name { font-size: 11px; font-weight: 600; color: #e8e4dd; margin-top: 3px; }
        .role-card .role-hint { font-size: 9px; color: #6b6760; }

        .pin-display {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 14px 0;
        }
        .pin-dot {
            width: 16px; height: 16px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.15);
            transition: all 0.2s;
        }
        .pin-dot.filled { background: #d4a853; border-color: #d4a853; }
        .pin-dot.error { background: #ef4444; border-color: #ef4444; }

        .pin-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            max-width: 220px;
            margin: 0 auto;
        }
        .pin-key {
            padding: 14px;
            border-radius: 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
        }
        .pin-key:active { background: rgba(212,168,83,0.2); }

        .login-msg { margin-top: 10px; font-size: 13px; font-weight: 600; min-height: 20px; }
        .login-msg.error { color: #ef4444; }
        .login-msg.success { color: #10b981; }

        .quick-pins {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .quick-pin {
            padding: 7px 12px;
            border-radius: 20px;
            font-size: 11px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            color: #a8a49e;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
        }
        .quick-pin:hover { border-color: #d4a853; color: #d4a853; }
        
        .btn-reset {
            display: block;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            font-family: 'Cairo', sans-serif;
            background: rgba(239,68,68,0.1);
            color: #ef4444;
            border: 1px solid rgba(239,68,68,0.2);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">🍽️</div>
            <div class="login-title">Thana Restaurant</div>
            <div class="login-subtitle">نظام إدارة مطعم متكامل</div>

            <div class="role-selector" id="roleSelector">
                <div class="role-card selected" data-pin="2026" data-role="admin" onclick="selectRole(this)">
                    <span class="role-icon">🔑</span>
                    <span class="role-name">المدير</span>
                    <span class="role-hint">PIN: 2026</span>
                </div>
                <div class="role-card" data-pin="1111" data-role="waiter" onclick="selectRole(this)">
                    <span class="role-icon">📋</span>
                    <span class="role-name">النادل</span>
                    <span class="role-hint">PIN: 1111</span>
                </div>
                <div class="role-card" data-pin="2222" data-role="kitchen" onclick="selectRole(this)">
                    <span class="role-icon">🍳</span>
                    <span class="role-name">المطبخ</span>
                    <span class="role-hint">PIN: 2222</span>
                </div>
                <div class="role-card" data-pin="3333" data-role="cashier" onclick="selectRole(this)">
                    <span class="role-icon">💰</span>
                    <span class="role-name">الكاشير</span>
                    <span class="role-hint">PIN: 3333</span>
                </div>
            </div>

            <div class="pin-display" id="pinDots">
                <span class="pin-dot"></span><span class="pin-dot"></span>
                <span class="pin-dot"></span><span class="pin-dot"></span>
            </div>

            <div class="login-msg" id="loginMsg"></div>

            <div class="pin-pad" id="pinPad"></div>

            <div class="quick-pins">
                <button class="quick-pin" onclick="quickLogin('2026')">🔑 مدير (2026)</button>
                <button class="quick-pin" onclick="quickLogin('1111')">📋 نادل</button>
                <button class="quick-pin" onclick="quickLogin('2222')">🍳 مطبخ</button>
                <button class="quick-pin" onclick="quickLogin('3333')">💰 كاشير</button>
                <button class="quick-pin" onclick="quickLogin('4444')">📊 مناوب</button>
            </div>

            <button class="btn-reset" onclick="localStorage.clear();location.reload();">🗑️ مسح البيانات وإعادة ضبط</button>
        </div>
    </div>

    <script>
        // PINs ثابتة
        const USERS = {
            '2026': { name: 'المدير', role: 'admin' },
            '1111': { name: 'النادل', role: 'waiter' },
            '2222': { name: 'المطبخ', role: 'kitchen' },
            '3333': { name: 'الكاشير', role: 'cashier' },
            '4444': { name: 'مدير مناوب', role: 'manager' },
        };

        let enteredPin = '';

        function selectRole(card) {
            document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            enteredPin = '';
            updateDots();
            document.getElementById('loginMsg').textContent = '';
            document.getElementById('loginMsg').className = 'login-msg';
        }

        function buildPinPad() {
            const pad = document.getElementById('pinPad');
            const keys = ['1','2','3','4','5','6','7','8','9','⌫','0','✓'];
            pad.innerHTML = keys.map(k => `<button class="pin-key" onclick="pinPress('${k}')">${k}</button>`).join('');
        }

        function pinPress(key) {
            const msg = document.getElementById('loginMsg');
            msg.textContent = '';
            msg.className = 'login-msg';

            if (key === '⌫') { enteredPin = enteredPin.slice(0, -1); }
            else if (key === '✓') { doLogin(); return; }
            else { if (enteredPin.length < 4) { enteredPin += key; if (enteredPin.length === 4) setTimeout(doLogin, 300); } }
            updateDots();
        }

        function updateDots() {
            document.querySelectorAll('.pin-dot').forEach((d, i) => {
                d.classList.toggle('filled', i < enteredPin.length);
                d.classList.remove('error');
            });
        }

        function doLogin() {
            const pin = enteredPin;
            const msg = document.getElementById('loginMsg');
            
            if (USERS[pin]) {
                const user = USERS[pin];
                localStorage.setItem('thana_auth_session', JSON.stringify({
                    userId: user.role,
                    role: user.role,
                    loginTime: new Date().toISOString()
                }));
                msg.textContent = '✅ مرحباً ' + user.name + '!';
                msg.className = 'login-msg success';
                setTimeout(() => { window.location.href = 'index.html'; }, 500);
            } else {
                msg.textContent = '❌ رمز PIN غير صحيح';
                msg.className = 'login-msg error';
                document.querySelectorAll('.pin-dot').forEach(d => d.classList.add('error'));
                setTimeout(() => {
                    document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('error', 'filled'));
                }, 500);
                enteredPin = '';
            }
        }

        function quickLogin(pin) {
            enteredPin = pin;
            updateDots();
            doLogin();
        }

        buildPinPad();
    </script>
</body>
</html>
