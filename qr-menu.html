<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القائمة - Thana</title>
    <link rel="stylesheet" href="theme-v2.css">
    <meta name="theme-color" content="#0a0b0f">
    <style>
        body{padding:16px;font-family:'Cairo',sans-serif;background:#0a0b0f;color:#e8e4dd}
        .container{max-width:700px;margin:0 auto}
        .header{text-align:center;padding:12px 0}
        .header h1{font-size:22px;color:#d4a853}
        .table-badge{display:inline-block;background:rgba(129,140,248,0.2);color:#818cf8;padding:6px 14px;border-radius:20px;font-size:13px;margin:6px}

        .cats{display:flex;gap:6px;overflow-x:auto;padding:8px 0;scrollbar-width:none}
        .cats::-webkit-scrollbar{display:none}
        .cat{padding:8px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.02);color:#a8a49e;font-size:12px;white-space:nowrap;cursor:pointer}
        .cat.active{background:rgba(212,168,83,0.15);color:#d4a853;border-color:#d4a853}

        .item{background:#161820;border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
        .item-info h3{font-size:15px;margin-bottom:2px}
        .item-info .desc{font-size:11px;color:#6b6760}
        .item-price{font-size:17px;font-weight:700;color:#d4a853}
        .item-actions{display:flex;align-items:center;gap:8px}
        .qbtn{width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
        .qty{font-size:15px;font-weight:600;min-width:20px;text-align:center}

        .cart-fab{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#b8942e,#d4a853);color:#1a1814;padding:12px 24px;border-radius:30px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 6px 24px rgba(212,168,83,0.3);z-index:100;display:flex;align-items:center;gap:8px;border:none;font-family:'Cairo',sans-serif}
        .cart-count{background:rgba(0,0,0,0.2);padding:3px 10px;border-radius:14px;font-size:13px}

        .modal{position:fixed;bottom:0;left:0;right:0;background:#161820;border-radius:22px 22px 0 0;padding:20px;z-index:200;transform:translateY(100%);transition:transform 0.3s;max-height:65vh;overflow-y:auto;border-top:1px solid rgba(255,255,255,0.08)}
        .modal.open{transform:translateY(0)}
        .cart-total{text-align:center;font-size:18px;font-weight:700;padding:12px 0}
        .btn{display:block;width:100%;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;font-family:'Cairo',sans-serif}
        .btn-primary{background:linear-gradient(135deg,#b8942e,#d4a853);color:#1a1814}
        .btn-danger{background:rgba(239,68,68,0.12);color:#ef4444}
        .btn-outline{background:transparent;border:1px solid rgba(255,255,255,0.08);color:#fff}
        .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:150;display:none}
        .overlay.show{display:block}
        .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:10px 20px;border-radius:30px;font-weight:700;z-index:300}
    </style>
</head>
<body>
<div class="container">
<div class="header">
    <div style="font-size:40px">🍽️</div>
    <h1 id="shopTitle">Thana Restaurant</h1>
    <div class="table-badge">🪑 طاولة <span id="tableNumber">1</span></div>
</div>

<div class="cats" id="cats"></div>
<div id="menuGrid"></div>
</div>

<div class="overlay" id="overlay" onclick="closeCart()"></div>
<button class="cart-fab" id="cartFab" onclick="openCart()">🛒 السلة <span class="cart-count" id="cartCount">0</span></button>

<div class="modal" id="cartModal">
<h2 style="color:#d4a853;text-align:center">🛒 طلباتك</h2>
<div id="cartItems"></div>
<div class="cart-total" id="cartTotal">المجموع: 0</div>
<input type="text" id="orderNote" placeholder="ملاحظات (بدون بصل...)" style="width:100%;padding:10px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#fff;font-family:'Cairo',sans-serif;font-size:13px;margin-top:6px">
<button class="btn btn-primary" onclick="submitOrder()">📤 إرسال للمطبخ</button>
<button class="btn btn-danger" onclick="clearCart()">🗑️ تفريغ</button>
<button class="btn btn-outline" onclick="closeCart()">✕ إغلاق</button>
</div>

<script>
// القائمة ثابتة
var MENU = [
    {name:'شاورما دجاج',cat:'وجبات رئيسية',price:25000},
    {name:'شاورما لحم',cat:'وجبات رئيسية',price:30000},
    {name:'فلافل',cat:'وجبات رئيسية',price:15000},
    {name:'برجر',cat:'وجبات رئيسية',price:35000},
    {name:'مشاوي مشكل',cat:'وجبات رئيسية',price:50000},
    {name:'تبولة',cat:'مقبلات',price:10000},
    {name:'حمص',cat:'مقبلات',price:10000},
    {name:'بطاطا مقلية',cat:'مقبلات',price:8000},
    {name:'كولا',cat:'مشروبات',price:5000},
    {name:'عصير برتقال',cat:'مشروبات',price:7000},
    {name:'ماء',cat:'مشروبات',price:2000},
    {name:'كنافة',cat:'حلويات',price:20000}
];

var params = new URLSearchParams(window.location.search);
var tableId = params.get('table')||'1';
document.getElementById('tableNumber').textContent = tableId;

var shop = JSON.parse(localStorage.getItem('thana_shop_settings')||'{}');
if(shop.name) document.getElementById('shopTitle').textContent = shop.name;

var cart = [];
var activeCat = 'الكل';

function getCats(){
    var c = ['الكل'];
    MENU.forEach(function(i){if(c.indexOf(i.cat)===-1)c.push(i.cat)});
    return c;
}

function renderCats(){
    var h = '';
    getCats().forEach(function(c){
        h += '<button class="cat'+(c===activeCat?' active':'')+'" onclick="filter(\''+c+'\')">'+c+'</button>';
    });
    document.getElementById('cats').innerHTML = h;
}

function filter(c){activeCat=c;renderCats();renderMenu();}

function renderMenu(){
    var items = activeCat==='الكل' ? MENU : MENU.filter(function(i){return i.cat===activeCat});
    var h = '';
    items.forEach(function(item){
        var q = getQty(item.name);
        h += '<div class="item"><div class="item-info"><h3>'+item.name+'</h3><div class="desc">'+(item.price||0).toLocaleString()+' ل.س</div></div><div class="item-actions"><button class="qbtn" onclick="removeItem(\''+item.name+'\')">−</button><span class="qty">'+q+'</span><button class="qbtn" onclick="addItem(\''+item.name+'\','+item.price+')">+</button></div></div>';
    });
    document.getElementById('menuGrid').innerHTML = h;
}

function getQty(name){var f=cart.find(function(i){return i.name===name});return f?f.qty:0}
function addItem(name,price){
    var f=cart.find(function(i){return i.name===name});
    if(f){f.qty++}else{cart.push({name:name,price:price,qty:1})}
    updateCart();if(navigator.vibrate)navigator.vibrate(20);
}
function removeItem(name){
    var f=cart.find(function(i){return i.name===name});
    if(f){f.qty--;if(f.qty<=0)cart=cart.filter(function(i){return i.name!==name})}
    updateCart();
}

function updateCart(){
    var tq=cart.reduce(function(s,i){return s+i.qty},0);
    var tp=cart.reduce(function(s,i){return s+(i.price*i.qty)},0);
    document.getElementById('cartCount').textContent = tq;
    document.getElementById('cartTotal').textContent = 'المجموع: '+tp.toLocaleString()+' ل.س';
    renderMenu();
}

function openCart(){document.getElementById('cartModal').classList.add('open');document.getElementById('overlay').classList.add('show')}
function closeCart(){document.getElementById('cartModal').classList.remove('open');document.getElementById('overlay').classList.remove('show')}
function clearCart(){cart=[];updateCart();closeCart()}

function submitOrder(){
    if(cart.length===0)return;
    var order = {
        id:Date.now(),table:tableId,
        items:cart.map(function(i){return{name:i.name,price:i.price,qty:i.qty}}),
        total:cart.reduce(function(s,i){return s+(i.price*i.qty)},0),
        note:document.getElementById('orderNote').value,
        status:'new',timestamp:new Date().toISOString(),source:'qr'
    };
    var orders = JSON.parse(localStorage.getItem('thana_orders')||'[]');
    orders.push(order);
    localStorage.setItem('thana_orders',JSON.stringify(orders));
    localStorage.setItem('thana_new_order_notify',JSON.stringify(order));
    
    cart=[];document.getElementById('orderNote').value='';
    updateCart();closeCart();
    showToast('✅ تم الإرسال للمطبخ!');
}

function showToast(m){
    var t=document.querySelector('.toast');if(t)t.remove();
    t=document.createElement('div');t.className='toast';t.textContent=m;
    document.body.appendChild(t);setTimeout(function(){t.remove()},2000);
}

renderCats();renderMenu();updateCart();
</script>
</body>
</html>
