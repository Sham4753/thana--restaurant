<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القائمة - Thana Restaurant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="theme.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a5f">
    <script src="pwa-register.js" defer></script>
    <style>
        :root {
            --bg: #0a0f1e;
            --card: rgba(15,23,42,0.8);
            --accent: #38bdf8;
            --accent2: #818cf8;
            --success: #34d399;
            --warning: #fbbf24;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --radius: 16px;
            --glass-border: rgba(255,255,255,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
        }
        .container { max-width: 800px; margin: 0 auto; }

        /* الهيدر */
        .header {
            text-align: center;
            padding: 20px 0;
        }
        .header .logo {
            font-size: 42px;
            margin-bottom: 8px;
        }
        .header h1 {
            font-size: 26px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header .table-badge {
            display: inline-block;
            background: rgba(129,140,248,0.2);
            color: var(--accent2);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            margin-top: 8px;
        }
        .header .waiter-call {
            display: inline-block;
            background: rgba(251,191,36,0.2);
            color: var(--warning);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            margin-top: 8px;
            cursor: pointer;
            border: 1px solid rgba(251,191,36,0.3);
            transition: all 0.3s;
        }
        .header .waiter-call:hover { background: rgba(251,191,36,0.3); }
        .header .waiter-call.called { background: rgba(52,211,153,0.3); color: var(--success); }

        /* الفئات */
        .categories {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 16px 0;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn {
            padding: 10px 18px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: var(--card);
            color: var(--text-muted);
            font-size: 14px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        .cat-btn.active {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border-color: transparent;
        }

        /* القائمة */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        .menu-item {
            background: var(--card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            cursor: pointer;
        }
        .menu-item:hover { border-color: rgba(255,255,255,0.2); }
        .menu-item:active { transform: scale(0.98); }
        .menu-item.disabled { opacity: 0.4; pointer-events: none; }
        .item-info h3 { font-size: 16px; margin-bottom: 4px; }
        .item-info .desc { font-size: 12px; color: var(--text-muted); }
        .item-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
        }
        .item-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .qty-btn {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .qty-btn:hover { background: rgba(255,255,255,0.1); }
        .qty-num { font-size: 16px; font-weight: 600; min-width: 20px; text-align: center; }

        /* السلة */
        .cart-fab {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(56,189,248,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
            transition: all 0.3s;
        }
        .cart-fab:hover { transform: translateX(-50%) translateY(-2px); box-shadow: 0 12px 40px rgba(56,189,248,0.4); }
        .cart-count {
            background: rgba(0,0,0,0.3);
            padding: 4px 10px;
            border-radius: 14px;
            font-size: 14px;
        }

        /* نافذة السلة */
        .cart-modal {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(15,23,42,0.98);
            border-radius: 24px 24px 0 0;
            padding: 20px;
            z-index: 200;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
            max-height: 70vh;
            overflow-y: auto;
            border-top: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
        }
        .cart-modal.open { transform: translateY(0); }
        .cart-modal h2 { text-align: center; margin-bottom: 16px; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .cart-item-total { color: var(--accent); font-weight: 600; }
        .cart-summary {
            text-align: center;
            padding: 16px 0;
            font-size: 20px;
            font-weight: 700;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.05);
            color: var(--text);
            border: 1px solid var(--glass-border);
        }
        .btn-danger {
            background: rgba(248,113,113,0.2);
            color: #f87171;
        }

        /* إشعار */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: #000;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 700;
            z-index: 300;
            animation: slideDown 0.4s ease, slideUp 0.4s ease 2.5s forwards;
        }
        @keyframes slideDown { from { transform: translateX(-50%) translateY(-100px); opacity: 0; } }
        @keyframes slideUp { to { transform: translateX(-50%) translateY(-100px); opacity: 0; } }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 150;
            display: none;
        }
        .overlay.show { display: block; }

        /* تعليق */
        .note-input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            margin-top: 8px;
            resize: vertical;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🍽️</div>
            <h1>Thana Restaurant</h1>
            <div class="table-badge">🪑 طاولة رقم <span id="tableNumber">--</span></div>
            <br>
            <span class="waiter-call" id="waiterCall" onclick="callWaiter()">🔔 مناداة النادل</span>
        </div>

        <div class="categories" id="categories"></div>
        <div class="menu-grid" id="menuGrid"></div>
    </div>

    <div class="overlay" id="overlay" onclick="closeCart()"></div>

    <button class="cart-fab" id="cartFab" onclick="openCart()">
        🛒 السلة <span class="cart-count" id="cartCount">0</span>
    </button>

    <div class="cart-modal" id="cartModal">
        <h2>🛒 طلباتك</h2>
        <div id="cartItems"></div>
        <div class="cart-summary" id="cartTotal">المجموع: 0 ل.س</div>
        <textarea class="note-input" id="orderNote" placeholder="ملاحظات إضافية... (اختياري)"></textarea>
        <button class="btn btn-primary" onclick="submitOrder()">📤 إرسال الطلب للمطبخ</button>
        <button class="btn btn-danger" onclick="clearCart()">🗑️ تفريغ السلة</button>
        <button class="btn btn-secondary" onclick="closeCart()">✕ إغلاق</button>
    </div>

    <script>
        // استخراج رقم الطاولة من URL
        const params = new URLSearchParams(window.location.search);
        const tableId = params.get('table') || '1';
        document.getElementById('tableNumber').textContent = tableId;

        // القائمة الافتراضية
        let menu = JSON.parse(localStorage.getItem('thana_menu') || '[]');
        if (menu.length === 0) {
            menu = [
                { name: 'شاورما دجاج', category: 'وجبات رئيسية', price: 25000, desc: 'دجاج طازج مع ثوم وصلصة' },
                { name: 'شاورما لحم', category: 'وجبات رئيسية', price: 30000, desc: 'لحم بقري مع طحينة وبقدونس' },
                { name: 'فلافل', category: 'وجبات رئيسية', price: 15000, desc: 'فلافل مقرمش مع سلطة' },
                { name: 'برجر', category: 'وجبات رئيسية', price: 35000, desc: 'لحم أنجوس مع جبنة وخس' },
                { name: 'بيتزا', category: 'وجبات رئيسية', price: 40000, desc: 'بيتزا إيطالية مع جبنة موزاريلا' },
                { name: 'تبولة', category: 'مقبلات', price: 10000, desc: 'برغل طازج مع بقدونس وبندورة' },
                { name: 'حمص', category: 'مقبلات', price: 10000, desc: 'حمص كريمي مع زيت زيتون' },
                { name: 'بطاطا مقلية', category: 'مقبلات', price: 8000, desc: 'بطاطا ذهبية مقرمشة' },
                { name: 'كولا', category: 'مشروبات', price: 5000, desc: 'مشروب غازي' },
                { name: 'عصير برتقال', category: 'مشروبات', price: 7000, desc: 'عصير طبيعي طازج' },
                { name: 'ماء', category: 'مشروبات', price: 2000, desc: 'مياه معدنية' },
                { name: 'كنافة', category: 'حلويات', price: 20000, desc: 'كنافة بالقشطة والفستق' },
            ];
        }

        let cart = [];
        let activeCategory = 'الكل';

        function getCategories() {
            const cats = ['الكل', ...new Set(menu.map(i => i.category || 'أخرى'))];
            return cats;
        }

        function renderCategories() {
            const cats = getCategories();
            document.getElementById('categories').innerHTML = cats.map(c => `
                <button class="cat-btn ${c === activeCategory ? 'active' : ''}" onclick="filterCategory('${c}')">${c}</button>
            `).join('');
        }

        function filterCategory(cat) {
            activeCategory = cat;
            renderCategories();
            renderMenu();
        }

        function getQty(itemName) {
            const found = cart.find(i => i.name === itemName);
            return found ? found.qty : 0;
        }

        function addToCart(item) {
            const found = cart.find(i => i.name === item.name);
            if (found) {
                found.qty++;
            } else {
                cart.push({ name: item.name, price: item.price, qty: 1 });
            }
            updateCartUI();
            // هزة خفيفة
            if (navigator.vibrate) navigator.vibrate(30);
        }

        function removeFromCart(item) {
            const found = cart.find(i => i.name === item.name);
            if (found) {
                found.qty--;
                if (found.qty <= 0) {
                    cart = cart.filter(i => i.name !== item.name);
                }
            }
            updateCartUI();
        }

        function renderMenu() {
            const filtered = activeCategory === 'الكل' ? menu : menu.filter(i => (i.category || 'أخرى') === activeCategory);
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = filtered.map(item => {
                const qty = getQty(item.name);
                return `
                    <div class="menu-item">
                        <div class="item-info">
                            <h3>${item.name}</h3>
                            <div class="desc">${item.desc || ''}</div>
                        </div>
                        <div style="display:flex;align-items:center;gap:12px;">
                            <div class="item-price">${item.price.toLocaleString()} ل.س</div>
                            <div class="item-actions">
                                <button class="qty-btn" onclick="removeFromCart({name:'${item.name}',price:${item.price}})">−</button>
                                <span class="qty-num">${qty}</span>
                                <button class="qty-btn" onclick="addToCart({name:'${item.name}',price:${item.price}})">+</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateCartUI() {
            const totalQty = cart.reduce((sum, i) => sum + i.qty, 0);
            const totalPrice = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
            document.getElementById('cartCount').textContent = totalQty;
            document.getElementById('cartTotal').textContent = `المجموع: ${totalPrice.toLocaleString()} ل.س`;
            
            const cartItems = document.getElementById('cartItems');
            if (cart.length === 0) {
                cartItems.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:20px;">السلة فارغة</p>';
            } else {
                cartItems.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div>
                            <div>${item.name}</div>
                            <div style="font-size:12px;color:var(--text-muted);">${item.price.toLocaleString()} ل.س</div>
                        </div>
                        <div style="display:flex;align-items:center;gap:10px;">
                            <button class="qty-btn" onclick="removeFromCart({name:'${item.name}',price:${item.price}})">−</button>
                            <span>${item.qty}</span>
                            <button class="qty-btn" onclick="addToCart({name:'${item.name}',price:${item.price}})">+</button>
                        </div>
                        <div class="cart-item-total">${(item.price * item.qty).toLocaleString()} ل.س</div>
                    </div>
                `).join('');
            }
            renderMenu();
        }

        function openCart() {
            document.getElementById('cartModal').classList.add('open');
            document.getElementById('overlay').classList.add('show');
        }

        function closeCart() {
            document.getElementById('cartModal').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');
        }

        function clearCart() {
            if (confirm('تفريغ السلة؟')) {
                cart = [];
                updateCartUI();
                closeCart();
            }
        }

        function submitOrder() {
            if (cart.length === 0) {
                showToast('⚠️ السلة فارغة');
                return;
            }

            const note = document.getElementById('orderNote').value;
            const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
            
            const order = {
                id: Date.now(),
                table: tableId,
                items: cart.map(i => ({ name: i.name, price: i.price, qty: i.qty })),
                total: total,
                note: note,
                status: 'new',
                timestamp: new Date().toISOString(),
                source: 'qr', // مهم: يفرق بين طلب النادل وطلب QR
            };

            // حفظ الطلب
            const orders = JSON.parse(localStorage.getItem('thana_orders') || '[]');
            orders.push(order);
            localStorage.setItem('thana_orders', JSON.stringify(orders));

            // إشعار الصوت
            localStorage.setItem('thana_new_order_notify', JSON.stringify(order));

            // تفريغ السلة
            cart = [];
            document.getElementById('orderNote').value = '';
            updateCartUI();
            closeCart();

            showToast('✅ تم إرسال الطلب للمطبخ!');

            // تحديث الطاولة
            updateTableStatus();
        }

        function updateTableStatus() {
            let tables = JSON.parse(localStorage.getItem('thana_tables') || '[]');
            const table = tables.find(t => t.id == tableId);
            if (table) {
                table.status = 'busy';
                localStorage.setItem('thana_tables', JSON.stringify(tables));
            }
        }

        function callWaiter() {
            const btn = document.getElementById('waiterCall');
            btn.textContent = '✅ تم النداء - النادل قادم';
            btn.classList.add('called');
            
            // حفظ نداء النادل
            const calls = JSON.parse(localStorage.getItem('thana_waiter_calls') || '[]');
            calls.push({
                table: tableId,
                time: new Date().toISOString(),
                status: 'pending'
            });
            localStorage.setItem('thana_waiter_calls', JSON.stringify(calls));

            showToast('🔔 تم مناداة النادل');

            setTimeout(() => {
                btn.textContent = '🔔 مناداة النادل';
                btn.classList.remove('called');
            }, 10000);
        }

        function showToast(msg) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // عرض QR Code للطاولة
        function generateQR() {
            const url = `${window.location.origin}${window.location.pathname}?table=${tableId}`;
            return url;
        }

        // بدء التشغيل
        renderCategories();
        renderMenu();
        updateCartUI();
    </script>
</body>
</html>
