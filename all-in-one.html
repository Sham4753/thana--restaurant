<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thana Restaurant</title>
    <link rel="stylesheet" href="theme-neon.css">
    <style>
        body{font-family:'Cairo',sans-serif;background:var(--bg-dark);color:#fff;padding:16px}
        .tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
        .tab{padding:10px 16px;border-radius:8px;border:1px solid rgba(0,240,255,0.2);background:transparent;color:var(--neon-cyan);cursor:pointer;font-family:'Cairo',sans-serif;font-size:13px}
        .tab.active{background:var(--neon-cyan);color:#000}
        .panel{display:none}
        .panel.active{display:block}
        .btn{padding:10px 20px;border-radius:8px;border:none;background:var(--neon-cyan);color:#000;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;margin:4px}
        .card{background:var(--bg-card);border:1px solid rgba(0,240,255,0.1);border-radius:16px;padding:16px;margin:8px 0}
        select,input{padding:8px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(0,240,255,0.15);color:#fff;font-family:'Cairo',sans-serif}
    </style>
</head>
<body>
<h1 style="color:var(--neon-cyan);text-align:center">🍽️ Thana</h1>

<div class="tabs">
    <button class="tab active" onclick="show('waiter')">📋 نادل</button>
    <button class="tab" onclick="show('kitchen')">🍳 مطبخ</button>
    <button class="tab" onclick="show('orders')">💰 كاشير</button>
</div>

<div id="panel-waiter" class="panel active">
    <div class="card">
        <h3>تسجيل طلب</h3>
        <select id="tableSelect"></select>
        <select id="itemSelect"></select>
        <input type="number" id="itemQty" value="1" min="1" style="width:60px">
        <button class="btn" onclick="addItem()">➕ إضافة</button>
        <div id="orderPreview"></div>
        <button class="btn" onclick="submitOrder()" style="background:#10b981;margin-top:8px">📤 إرسال للمطبخ</button>
    </div>
</div>

<div id="panel-kitchen" class="panel">
    <div class="card">
        <h3>شاشة المطبخ</h3>
        <button class="btn" onclick="loadKitchen()">🔄 تحديث</button>
        <div id="kitchenOrders"></div>
    </div>
</div>

<div id="panel-orders" class="panel">
    <div class="card">
        <h3>الطلبات</h3>
        <div id="allOrders"></div>
    </div>
</div>

<script>
// ========== قائمة ==========
var menu = JSON.parse(localStorage.getItem('thana_menu')||'[]');
if(menu.length===0) menu=[{name:'شاورما',price:25000},{name:'برجر',price:35000},{name:'فلافل',price:15000},{name:'كولا',price:5000}];

var currentOrder = [];

function show(panel){
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
    event.target.classList.add('active');
    document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
    document.getElementById('panel-'+panel).classList.add('active');
    if(panel==='kitchen') loadKitchen();
    if(panel==='orders') loadOrders();
}

// ========== قوائم ==========
function loadSelects(){
    var ts = document.getElementById('tableSelect');
    ts.innerHTML = '<option value="safari">🛍️ سفري</option>';
    for(var i=1;i<=15;i++) ts.innerHTML += '<option value="'+i+'">🪑 طاولة '+i+'</option>';
    
    var is = document.getElementById('itemSelect');
    is.innerHTML = menu.map(function(m){return '<option value="'+m.name+'">'+m.name+' - '+m.price.toLocaleString()+' ل.س</option>'}).join('');
}

// ========== نادل ==========
function addItem(){
    var name = document.getElementById('itemSelect').value;
    var qty = parseInt(document.getElementById('itemQty').value)||1;
    var item = menu.find(function(m){return m.name===name});
    if(!item)return;
    
    var found = currentOrder.find(function(i){return i.name===name});
    if(found){found.qty+=qty}else{currentOrder.push({name:name,price:item.price,qty:qty})}
    renderPreview();
}

function renderPreview(){
    var el = document.getElementById('orderPreview');
    if(currentOrder.length===0){el.innerHTML='';return}
    var total = currentOrder.reduce(function(s,i){return s+(i.price*i.qty)},0);
    el.innerHTML = currentOrder.map(function(i,idx){return '<div>'+i.name+' ×'+i.qty+' = '+(i.price*i.qty).toLocaleString()+' ل.س <span onclick="removeItem('+idx+')" style="color:#ef4444;cursor:pointer">✕</span></div>'}).join('')
        + '<div style="font-weight:700;color:var(--neon-cyan);margin-top:8px">المجموع: '+total.toLocaleString()+' ل.س</div>';
}

function removeItem(idx){currentOrder.splice(idx,1);renderPreview()}

function submitOrder(){
    if(currentOrder.length===0)return;
    var table = document.getElementById('tableSelect').value;
    var total = currentOrder.reduce(function(s,i){return s+(i.price*i.qty)},0);
    
    var order = {id:Date.now(),table:table,items:currentOrder.map(function(i){return{name:i.name,price:i.price,qty:i.qty}}),total:total,status:'new',timestamp:new Date().toISOString(),source:'waiter'};
    
    var orders = JSON.parse(localStorage.getItem('thana_orders')||'[]');
    orders.push(order);
    localStorage.setItem('thana_orders',JSON.stringify(orders));
    
    currentOrder = [];
    renderPreview();
    alert('✅ تم الإرسال! رقم الطلب: ' + orders.length);
}

// ========== مطبخ ==========
function loadKitchen(){
    var orders = JSON.parse(localStorage.getItem('thana_orders')||'[]');
    var today = new Date().toLocaleDateString('ar-SA');
    var todayOrders = orders.filter(function(o){return new Date(o.timestamp).toLocaleDateString('ar-SA')===today && o.status!=='done'});
    
    var el = document.getElementById('kitchenOrders');
    if(todayOrders.length===0){el.innerHTML='<p style="color:#6b6760">لا توجد طلبات نشطة</p>';return}
    
    el.innerHTML = todayOrders.map(function(o){
        var items = (o.items||[]).map(function(i){return i.name+' ×'+i.qty}).join('، ');
        return '<div class="card" style="border-right:3px solid '+(o.status==='new'?'#f59e0b':'#38bdf8')+'"><b>🪑 '+(o.table==='safari'?'سفري':o.table)+'</b><br>'+items+'<br><b style="color:var(--neon-cyan)">'+o.total.toLocaleString()+' ل.س</b><br><button class="btn" onclick="markDone('+o.id+')">✅ جاهز</button></div>';
    }).join('');
}

function markDone(id){
    var orders = JSON.parse(localStorage.getItem('thana_orders')||'[]');
    var o = orders.find(function(x){return x.id===id});
    if(o){o.status='done';localStorage.setItem('thana_orders',JSON.stringify(orders));loadKitchen()}
}

// ========== كاشير ==========
function loadOrders(){
    var orders = JSON.parse(localStorage.getItem('thana_orders')||'[]');
    var el = document.getElementById('allOrders');
    if(orders.length===0){el.innerHTML='<p style="color:#6b6760">لا توجد طلبات</p>';return}
    el.innerHTML = orders.reverse().slice(0,20).map(function(o){
        var items = (o.items||[]).map(function(i){return i.name+' ×'+i.qty}).join('، ');
        return '<div class="card"><b>🪑 '+(o.table==='safari'?'سفري':o.table)+'</b> | '+items+' | <b style="color:var(--neon-cyan)">'+o.total.toLocaleString()+' ل.س</b> | '+(o.status||'')+'</div>';
    }).join('');
}

loadSelects();
</script>
</body>
</html>
