<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأوامر الصوتية - Thana Restaurant</title>
    <link rel="stylesheet" href="theme-v2.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0b0f">
    <script src="bridge.js" defer></script>
    <script src="pwa-register.js" defer></script>
    <style>
        body { padding: 16px; }
        .container { max-width: 600px; margin: 0 auto; text-align: center; }

        .header { padding: 20px 0; }
        .header .icon { font-size: 56px; }
        .header h1 {
            font-size: 26px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-top: 8px;
        }
        .header .subtitle { color: var(--text-muted); font-size: 14px; }

        .mic-circle {
            width: 120px; height: 120px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 3px solid var(--border-medium);
            margin: 16px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s;
        }
        .mic-circle.listening {
            border-color: var(--danger);
            background: rgba(248,113,113,0.1);
            animation: pulse-ring 1.5s infinite;
        }
        @keyframes pulse-ring {
            0%,100% { box-shadow: 0 0 0 0 rgba(248,113,113,0.4); }
            50% { box-shadow: 0 0 0 25px rgba(248,113,113,0); }
        }
        .mic-circle .mic-icon { font-size: 50px; }

        .status-text {
            font-size: 15px;
            margin: 8px 0;
            min-height: 22px;
            font-weight: 600;
        }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 16px;
            margin: 12px 0;
            backdrop-filter: var(--glass-blur);
            text-align: right;
        }
        .card h3 { font-size: 14px; color: var(--accent-primary); margin-bottom: 10px; }

        .parsed-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 15px;
        }
        .parsed-item .qty-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .parsed-item button {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: 1px solid var(--border-medium);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: var(--radius-md);
            border: none;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            font-family: inherit;
            transition: all var(--transition-fast);
        }
        .btn-primary { background: var(--accent-gradient); color: #fff; }
        .btn-success { background: var(--success); color: #000; }
        .btn-danger { background: var(--danger-bg); color: var(--danger); }
        .btn-outline { background: transparent; border: 1px solid var(--border-medium); color: var(--text-primary); }

        .voice-hint {
            background: rgba(56,189,248,0.06);
            border-radius: var(--radius-md);
            padding: 12px;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.8;
        }
        .voice-hint b { color: var(--accent-primary); }

        input[type="number"] {
            width: 60px;
            padding: 8px;
            border-radius: var(--radius-sm);
            background: var(--bg-input);
            border: 1px solid var(--border-medium);
            color: #fff;
            font-size: 14px;
            text-align: center;
            font-family: inherit;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 13px;
        }
    </style>
<script src="nav-component.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">🎤</div>
            <h1>الأوامر الصوتية</h1>
            <div class="subtitle">تكلم - راجع - عدل - أرسل</div>
        </div>

        <!-- المايك -->
        <div class="mic-circle" id="micButton" onclick="toggleMic()">
            <span class="mic-icon">🎙️</span>
        </div>
        <div class="status-text" id="statusText">اضغط على المايك وتكلم</div>

        <!-- النص المنطوق -->
        <div class="card">
            <h3>🗣️ اللي انفهم</h3>
            <div id="transcript" style="font-size:18px;font-weight:600;">--</div>
            <div id="parsedResult" style="font-size:13px;color:var(--text-muted);margin-top:4px;"></div>
        </div>

        <!-- مراجعة الطلب قبل الإرسال -->
        <div class="card" id="reviewCard" style="display:none;">
            <h3>📋 راجع الطلب قبل الإرسال</h3>
            <div style="margin-bottom:8px;">
                <label style="font-size:13px;color:var(--text-muted);">🪑 رقم الطاولة:</label>
                <input type="number" id="reviewTable" value="1" min="1" max="15" style="width:70px;margin-right:8px;">
            </div>
            <div id="reviewItems"></div>
            <div style="margin-top:8px;">
                <label style="font-size:13px;color:var(--text-muted);">📝 ملاحظة:</label>
                <input type="text" id="reviewNote" placeholder="بدون بصل... إلخ" style="width:100%;padding:8px;border-radius:var(--radius-sm);background:var(--bg-input);border:1px solid var(--border-medium);color:#fff;margin-top:4px;font-family:inherit;">
            </div>
            <div style="font-size:18px;font-weight:700;text-align:center;margin:12px 0;" id="reviewTotal"></div>
            <button class="btn btn-success" onclick="confirmAndSend()">✅ تأكيد وإرسال للمطبخ</button>
            <button class="btn btn-outline" onclick="cancelReview()">↩️ إلغاء</button>
        </div>

        <!-- إدخال يدوي -->
        <div class="card">
            <h3>✍️ إدخال يدوي</h3>
            <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
                <span style="font-size:13px;">طاولة</span>
                <input type="number" id="manualTable" value="1" min="1" max="15" style="width:55px;">
                <select id="manualItem" style="padding:8px;border-radius:var(--radius-sm);background:var(--bg-input);border:1px solid var(--border-medium);color:#fff;font-family:inherit;flex:1;min-width:120px;"></select>
                <span style="font-size:13px;">×</span>
                <input type="number" id="manualQty" value="1" min="1" max="99" style="width:50px;">
                <button class="btn btn-primary" onclick="manualAdd()" style="width:auto;padding:8px 12px;">➕</button>
            </div>
            <div id="manualCart" style="margin-top:8px;font-size:13px;"></div>
            <button class="btn btn-success" onclick="manualSubmit()" style="margin-top:6px;">📤 إرسال اليدوي للمطبخ</button>
        </div>

        <!-- آخر الأوامر -->
        <div class="card">
            <h3>📋 آخر الأوامر المرسلة</h3>
            <div id="historyList"></div>
        </div>

        <div class="voice-hint">
            <b>💡 أمثلة:</b><br>
            "طاولة 3 شاورما 2 و كولا 1"<br>
            "الطاولة خمسة بدها فلافل وبرجر"<br>
            <b>⚠️ الطلب ما بنرسل إلا لما تضغط "تأكيد وإرسال"</b>
        </div>
    </div>

    <script>
        // ==================== Voice Engine v2 ====================
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isListening = false;
        let pendingOrder = null; // الطلب بانتظار التأكيد
        let manualCartItems = [];
        let voiceHistory = JSON.parse(localStorage.getItem('thana_voice_history') || '[]');

        function initSpeech() {
            if (!SpeechRecognition) return false;
            recognition = new SpeechRecognition();
            recognition.lang = 'ar-SA';
            recognition.interimResults = false;
            recognition.maxAlternatives = 2;
            recognition.continuous = false;

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                document.getElementById('transcript').textContent = transcript;
                document.getElementById('statusText').textContent = '🔄 جاري تحليل الأمر...';
                
                const parsed = parseVoiceCommand(transcript);
                
                if (parsed && parsed.items.length > 0) {
                    document.getElementById('parsedResult').textContent = 
                        '✅ تم الفهم: ' + parsed.items.map(i => `${i.name} ×${i.qty}`).join(' | ');
                    document.getElementById('statusText').textContent = '👆 راجع الطلب ثم اضغط تأكيد';
                    document.getElementById('statusText').style.color = 'var(--success)';
                    
                    // خزن الطلب للمراجعة - ما نرسله مباشرة
                    pendingOrder = parsed;
                    showReview(parsed);
                } else {
                    document.getElementById('parsedResult').textContent = '⚠️ لم يتم فهم الطلب';
                    document.getElementById('statusText').textContent = '⚠️ حاول مرة أخرى';
                    document.getElementById('statusText').style.color = 'var(--warning)';
                }

                document.getElementById('micButton').classList.remove('listening');
                isListening = false;
            };

            recognition.onerror = function() {
                document.getElementById('statusText').textContent = '⚠️ خطأ - حاول مرة أخرى';
                document.getElementById('micButton').classList.remove('listening');
                isListening = false;
            };

            recognition.onend = function() {
                document.getElementById('micButton').classList.remove('listening');
                isListening = false;
            };

            return true;
        }

        function parseVoiceCommand(text) {
            let t = ' ' + text.trim() + ' ';
            
            const arabicNums = { 'واحد':1,'واحدة':1,'اثنين':2,'اثنان':2,'ثلاثة':3,'ثلاث':3,'اربعة':4,'اربع':4,'خمسة':5,'خمس':5,'ستة':6,'ست':6,'سبعة':7,'سبع':7,'ثمانية':8,'ثمان':8,'تسعة':9,'تسع':9,'عشرة':10,'عشر':10 };
            for (const [word, num] of Object.entries(arabicNums)) {
                t = t.replace(new RegExp(word, 'g'), String(num));
            }

            const tablePatterns = [/طاولة\s*(\d+)/, /طاوله\s*(\d+)/, /الطاولة\s*(\d+)/, /table\s*(\d+)/i, /رقم\s*(\d+)/];
            let table = null;
            for (const pattern of tablePatterns) {
                const match = t.match(pattern);
                if (match) { table = parseInt(match[1]); break; }
            }
            if (!table || table < 1 || table > 15) table = 1;

            const menu = JSON.parse(localStorage.getItem('thana_menu') || '[]');
            const defaultMenu = [
                { name: 'شاورما دجاج', price: 25000 }, { name: 'شاورما لحم', price: 30000 },
                { name: 'فلافل', price: 15000 }, { name: 'برجر', price: 35000 },
                { name: 'بيتزا', price: 40000 }, { name: 'كولا', price: 5000 },
                { name: 'عصير', price: 7000 }, { name: 'ماء', price: 2000 },
                { name: 'تبولة', price: 10000 }, { name: 'حمص', price: 10000 },
                { name: 'بطاطا', price: 8000 }, { name: 'كنافة', price: 20000 },
            ];
            const searchMenu = menu.length > 0 ? menu : defaultMenu;

            const items = [];
            for (const item of searchMenu) {
                const patterns = [
                    new RegExp(`${item.name}\\s+(\\d+)`, 'i'),
                    new RegExp(`(\\d+)\\s+${item.name}`, 'i'),
                    new RegExp(`${item.name}`, 'i'),
                ];
                for (const pattern of patterns) {
                    const match = t.match(pattern);
                    if (match && !items.find(i => i.name === item.name)) {
                        const qty = match[1] ? parseInt(match[1]) : 1;
                        items.push({ name: item.name, price: item.price, qty: Math.min(qty, 99) });
                        break;
                    }
                }
            }

            if (items.length === 0) return null;

            const total = items.reduce((sum, i) => sum + (i.price * i.qty), 0);
            return { table, items, total, raw: text.trim() };
        }

        // ========== شاشة المراجعة ==========
        function showReview(order) {
            document.getElementById('reviewCard').style.display = 'block';
            document.getElementById('reviewTable').value = order.table;
            document.getElementById('reviewNote').value = '';
            renderReviewItems(order);
        }

        function renderReviewItems(order) {
            const container = document.getElementById('reviewItems');
            container.innerHTML = order.items.map((item, i) => `
                <div class="parsed-item">
                    <span>${item.name}</span>
                    <div class="qty-control">
                        <button onclick="changeQty(${i}, -1)">−</button>
                        <span>${item.qty}</span>
                        <button onclick="changeQty(${i}, 1)">+</button>
                        <span style="color:var(--accent-primary);min-width:70px;text-align:left;">${(item.price * item.qty).toLocaleString()} ل.س</span>
                        <button onclick="removeItem(${i})" style="color:var(--danger);">✕</button>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('reviewTotal').textContent = 
                `💰 المجموع: ${order.items.reduce((s, i) => s + (i.price * i.qty), 0).toLocaleString()} ل.س`;
        }

        function changeQty(index, delta) {
            if (!pendingOrder) return;
            pendingOrder.items[index].qty = Math.max(1, pendingOrder.items[index].qty + delta);
            pendingOrder.total = pendingOrder.items.reduce((s, i) => s + (i.price * i.qty), 0);
            renderReviewItems(pendingOrder);
        }

        function removeItem(index) {
            if (!pendingOrder) return;
            pendingOrder.items.splice(index, 1);
            if (pendingOrder.items.length === 0) {
                cancelReview();
                return;
            }
            pendingOrder.total = pendingOrder.items.reduce((s, i) => s + (i.price * i.qty), 0);
            renderReviewItems(pendingOrder);
        }

        function confirmAndSend() {
            if (!pendingOrder || pendingOrder.items.length === 0) return;
            
            pendingOrder.table = parseInt(document.getElementById('reviewTable').value) || pendingOrder.table;
            pendingOrder.note = document.getElementById('reviewNote').value;
            pendingOrder.total = pendingOrder.items.reduce((s, i) => s + (i.price * i.qty), 0);

            const order = {
                id: Date.now(),
                table: pendingOrder.table,
                items: [...pendingOrder.items],
                total: pendingOrder.total,
                note: pendingOrder.note || '',
                status: 'new',
                timestamp: new Date().toISOString(),
                source: 'voice',
                voiceRaw: pendingOrder.raw
            };

            var orders=JSON.parse(localStorage.getItem("thana_orders")||"[]");orders.push(order);localStorage.setItem("thana_orders",JSON.stringify(orders));localStorage.setItem("thana_new_order_notify",JSON.stringify(order));

            voiceHistory.unshift({
                raw: pendingOrder.raw,
                items: [...pendingOrder.items],
                table: pendingOrder.table,
                time: new Date().toISOString()
            });
            if (voiceHistory.length > 10) voiceHistory = voiceHistory.slice(0, 10);
            localStorage.setItem('thana_voice_history', JSON.stringify(voiceHistory));

            document.getElementById('statusText').textContent = '✅ تم إرسال الطلب للمطبخ!';
            document.getElementById('statusText').style.color = 'var(--success)';
            document.getElementById('reviewCard').style.display = 'none';
            pendingOrder = null;
            document.getElementById('transcript').textContent = '--';
            document.getElementById('parsedResult').textContent = '';
            renderHistory();

            setTimeout(() => {
                document.getElementById('statusText').textContent = 'اضغط على المايك وتكلم';
                document.getElementById('statusText').style.color = '';
            }, 3000);
        }

        function cancelReview() {
            document.getElementById('reviewCard').style.display = 'none';
            pendingOrder = null;
            document.getElementById('statusText').textContent = 'اضغط على المايك وتكلم';
            document.getElementById('statusText').style.color = '';
        }

        function toggleMic() {
            if (!recognition) { if (!initSpeech()) return; }
            if (isListening) {
                recognition.stop();
                document.getElementById('micButton').classList.remove('listening');
                document.getElementById('statusText').textContent = 'اضغط على المايك وتكلم';
                isListening = false;
            } else {
                recognition.start();
                document.getElementById('micButton').classList.add('listening');
                document.getElementById('statusText').textContent = '🎤 تكلم الآن...';
                document.getElementById('statusText').style.color = 'var(--danger)';
                document.getElementById('transcript').textContent = '...';
                document.getElementById('parsedResult').textContent = '';
                isListening = true;
            }
        }

        function renderHistory() {
            const container = document.getElementById('historyList');
            if (voiceHistory.length === 0) {
                container.innerHTML = '<p style="color:var(--text-muted);font-size:13px;">لا توجد أوامر سابقة</p>';
                return;
            }
            container.innerHTML = voiceHistory.slice(0, 5).map(h => `
                <div class="history-item">
                    <div>
                        <span>🪑 ${h.table}</span> | 
                        ${h.items.map(i => `${i.name}×${i.qty}`).join(', ')}
                    </div>
                    <span style="font-size:11px;color:var(--text-muted);">${new Date(h.time).toLocaleTimeString('ar-SA')}</span>
                </div>
            `).join('');
        }

        // ========== إدخال يدوي ==========
        function loadMenuForManual() {
            const menu = JSON.parse(localStorage.getItem('thana_menu') || '[]');
            const select = document.getElementById('manualItem');
            const defaults = ['شاورما دجاج','شاورما لحم','فلافل','برجر','بيتزا','كولا','عصير','ماء','تبولة','حمص','بطاطا','كنافة'];
            const items = menu.length > 0 ? menu.map(i => ({ name: i.name, price: i.price })) : defaults.map(n => ({ name: n, price: 0 }));
            select.innerHTML = items.map(i => `<option value="${i.name}">${i.name}</option>`).join('');
        }

        function manualAdd() {
            const itemName = document.getElementById('manualItem').value;
            const qty = parseInt(document.getElementById('manualQty').value) || 1;
            if (!itemName) return;
            const menu = JSON.parse(localStorage.getItem('thana_menu') || '[]');
            const menuItem = menu.find(i => i.name === itemName);
            const price = menuItem ? menuItem.price : 0;
            const existing = manualCartItems.find(i => i.name === itemName);
            if (existing) { existing.qty += qty; }
            else { manualCartItems.push({ name: itemName, price, qty }); }
            renderManualCart();
        }

        function renderManualCart() {
            const container = document.getElementById('manualCart');
            if (manualCartItems.length === 0) {
                container.innerHTML = '<span style="color:var(--text-muted);">لا توجد أصناف مضافة</span>';
                return;
            }
            const total = manualCartItems.reduce((s, i) => s + (i.price * i.qty), 0);
            container.innerHTML = manualCartItems.map((i, idx) => 
                `<div style="padding:4px 0;">${i.name} ×${i.qty} = ${(i.price*i.qty).toLocaleString()} ل.س 
                <span onclick="removeManual(${idx})" style="color:var(--danger);cursor:pointer;">🗑️</span></div>`
            ).join('') + `<div style="font-weight:700;margin-top:4px;">المجموع: ${total.toLocaleString()} ل.س</div>`;
        }

        function removeManual(idx) {
            manualCartItems.splice(idx, 1);
            renderManualCart();
        }

        function manualSubmit() {
            if (manualCartItems.length === 0) return;
            const table = parseInt(document.getElementById('manualTable').value) || 1;
            const total = manualCartItems.reduce((s, i) => s + (i.price * i.qty), 0);
            const order = {
                id: Date.now(),
                table,
                items: [...manualCartItems],
                total,
                status: 'new',
                timestamp: new Date().toISOString(),
                source: 'voice',
                voiceRaw: 'إدخال يدوي'
            };
            var orders=JSON.parse(localStorage.getItem("thana_orders")||"[]");orders.push(order);localStorage.setItem("thana_orders",JSON.stringify(orders));localStorage.setItem("thana_new_order_notify",JSON.stringify(order));
            voiceHistory.unshift({ raw: 'إدخال يدوي', items: [...manualCartItems], table, time: new Date().toISOString() });
            if (voiceHistory.length > 10) voiceHistory = voiceHistory.slice(0, 10);
            localStorage.setItem('thana_voice_history', JSON.stringify(voiceHistory));
            manualCartItems = [];
            renderManualCart();
            renderHistory();
            document.getElementById('statusText').textContent = '✅ تم إرسال الطلب اليدوي!';
            document.getElementById('statusText').style.color = 'var(--success)';
            setTimeout(() => {
                document.getElementById('statusText').textContent = 'اضغط على المايك وتكلم';
                document.getElementById('statusText').style.color = '';
            }, 2500);
        }

        initSpeech();
        renderHistory();
        loadMenuForManual();
        renderManualCart();
    </script>
<script src="swipe-nav.js"></script>
</body>
</html>
