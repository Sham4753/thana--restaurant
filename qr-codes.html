<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رموز QR للطاولات</title>
    <link rel="stylesheet" href="theme-neon.css?v=2.1">
<script src="nav-component.js?v=2.1" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        body{padding:16px;font-family:'Cairo',sans-serif;background:#0a0b0f;color:#e8e4dd}
        .container{max-width:700px;margin:0 auto}
        .card{background:#161820;border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:16px;margin-bottom:12px}
        h2{color:#d4a853;text-align:center;margin-bottom:12px}
        .qr-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
        .qr-box{text-align:center;background:rgba(255,255,255,0.02);padding:14px;border-radius:12px}
        .qr-box canvas{margin:0 auto}
        .qr-label{font-size:13px;font-weight:600;margin-top:6px}
        .btn{display:block;width:100%;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;font-family:'Cairo',sans-serif}
        .btn-gold{background:linear-gradient(135deg,#b8942e,#d4a853);color:#1a1814}
    </style>
</head>
<body>
<div class="container">
<div class="card"><h2>📱 رموز QR للطاولات</h2>
<p style="text-align:center;color:#6b6760;font-size:12px">اطبع هذه الصفحة وضع كل كود على الطاولة المناسبة</p></div>

<div class="card">
<div class="qr-grid" id="qrGrid"></div>
</div>

<button class="btn btn-gold" onclick="window.print()">🖨️ طباعة جميع الرموز</button>
</div>

<script>
var base = window.location.origin + window.location.pathname.replace('qr-codes.html','qr-menu.html');
for(var i=1; i<=15; i++){
    var div = document.createElement('div');
    div.className = 'qr-box';
    div.innerHTML = '<div id="qr'+i+'"></div><div class="qr-label">🪑 طاولة '+i+'</div>';
    document.getElementById('qrGrid').appendChild(div);
    new QRCode(document.getElementById('qr'+i), {
        text: base+'?table='+i,
        width:100,height:100,
        colorDark:'#161820',colorLight:'#ffffff'
    });
}
</script>
</body>
</html>
