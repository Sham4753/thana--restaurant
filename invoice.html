<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <link rel="stylesheet" href="theme-v2.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاتورة</title>
    <style>
        @page { size: 80mm 200mm; margin: 0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            width: 80mm;
            margin: 0 auto;
            padding: 5mm;
            font-size: 12px;
            color: #000;
            background: #fff;
        }
        .center { text-align: center; }
        .header { font-size: 16px; font-weight: bold; margin-bottom: 4mm; }
        .subheader { font-size: 10px; margin-bottom: 2mm; }
        .line { border-top: 1px dashed #000; margin: 3mm 0; }
        .item { display: flex; justify-content: space-between; margin: 1mm 0; }
        .item-name { flex: 1; }
        .item-qty { width: 15mm; text-align: center; }
        .item-price { width: 20mm; text-align: right; }
        .total { font-size: 18px; font-weight: bold; margin: 3mm 0; }
        .footer { font-size: 10px; margin-top: 5mm; }
        .btn-print {
            background: #000; color: #fff; border: none;
            padding: 12px 30px; border-radius: 25px;
            font-size: 14px; cursor: pointer;
        }
    </style>
<script src="nav-component.js" defer></script>
</head>
<body>
    <div class="center header" id="restaurantName">Thana Restaurant</div>
    <div class="center subheader">📍 مطعمكم المفضل</div>
    <div class="center subheader" id="invoiceDate"></div>
    <div class="line"></div>
    <div class="center subheader">🪑 <span id="tableNumber">طاولة 1</span></div>
    <div class="line"></div>
    <div id="itemsList"></div>
    <div class="line"></div>
    <div class="total center" id="totalPrice">$0</div>
    <div class="line"></div>
    <div class="center footer">شكراً لزيارتكم 🫶</div>
    <div class="center footer">Thana Restaurant v1.0</div>
    <button class="btn-print" onclick="window.print()">🖨️ طباعة</button>

    <script>
        const url = new URL(window.location.href);
        const table = url.searchParams.get('table') || 'طاولة 1';
        const items = JSON.parse(url.searchParams.get('items') || '[{"name":"شاورما دجاج","qty":2,"price":3},{"name":"بيبسي","qty":1,"price":1}]');
        const total = url.searchParams.get('total') || '7';

        document.getElementById('restaurantName').textContent = localStorage.getItem('thana_restaurant_name') || 'Thana Restaurant';
        document.getElementById('invoiceDate').textContent = new Date().toLocaleDateString('ar-SA') + ' ' + new Date().toLocaleTimeString('ar-SA');
        document.getElementById('tableNumber').textContent = '🪑 ' + table;
        document.getElementById('totalPrice').textContent = '$' + total;

        document.getElementById('itemsList').innerHTML = items.map(i => `
            <div class="item">
                <span class="item-name">${i.name}</span>
                <span class="item-qty">x${i.qty}</span>
                <span class="item-price">$${i.price * i.qty}</span>
            </div>
        `).join('');

        // Auto-print
        window.onload = () => { setTimeout(() => window.print(), 500); };
    </script>
<script src="swipe-nav.js"></script>
</body>
</html>
