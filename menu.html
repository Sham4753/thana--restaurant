<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thana Menu</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        .menu-item{background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
        .menu-icon{font-size:2.5em;width:60px;text-align:center}
        .menu-info{flex:1}.menu-name{font-weight:600}
        .menu-price{font-size:1.2em;font-weight:700;color:var(--accent2);cursor:pointer}
        .menu-delete{color:var(--accent);cursor:pointer;font-size:1.2em;padding:8px}
    </style>
</head>
<body>
    <div class="app">
        <div class="header"><div class="header-icon">🍽️</div><div class="header-title">قائمة الطعام</div></div>
        <button class="btn btn-primary" style="width:100%;margin-bottom:16px" onclick="showAddModal()">➕ إضافة صنف</button>
        <div id="menuList"></div>
        <div class="modal" id="addModal">
            <div class="modal-content">
                <h3 id="modalTitle">➕ إضافة صنف</h3>
                <input type="text" id="itemName" placeholder="اسم الصنف">
                <input type="number" id="itemPrice" placeholder="السعر ($)" min="0.5" step="0.5">
                <select id="itemIcon"><option value="🌯">🌯</option><option value="🥙">🥙</option><option value="🍟">🍟</option><option value="🥤">🥤</option><option value="🧆">🧆</option><option value="🫘">🫘</option><option value="🍖">🍖</option><option value="🥗">🥗</option></select>
                <input type="hidden" id="editId">
                <button class="btn btn-primary" onclick="saveItem()">💾 حفظ</button>
                <button class="btn btn-ghost" onclick="closeModal()">✕ إلغاء</button>
            </div>
        </div>
        <nav class="bottom-nav">
            <a href="index.html">🏠</a><a href="waiter.html">📋</a><a href="kitchen.html">🍳</a>
            <a href="tables.html">🪑</a><a href="staff.html">👥</a><a href="inventory.html">📦</a>
            <a href="reports.html">📊</a><a href="admin.html">⚙️</a>
        </nav>
    </div>
    <script>
        const defaults=[{id:1,name:'شاورما دجاج',price:3,icon:'🌯'},{id:2,name:'شاورما لحم',price:4,icon:'🥙'},{id:3,name:'بطاطا مقلية',price:2,icon:'🍟'},{id:4,name:'بيبسي',price:1,icon:'🥤'},{id:5,name:'فلافل',price:2,icon:'🧆'},{id:6,name:'حمص',price:2,icon:'🫘'},{id:7,name:'مشاوي',price:5,icon:'🍖'},{id:8,name:'سلطة',price:2,icon:'🥗'}];
        let menu=JSON.parse(localStorage.getItem('thana_menu')||'null');
        if(!menu||menu.length===0){menu=defaults;save()}
        function save(){localStorage.setItem('thana_menu',JSON.stringify(menu))}
        function render(){
            document.getElementById('menuList').innerHTML=menu.map(m=>`
                <div class="menu-item">
                    <div class="menu-icon">${m.icon}</div>
                    <div class="menu-info"><div class="menu-name">${m.name}</div></div>
                    <div class="menu-price" onclick="editItem(${m.id})">$${m.price}</div>
                    <span class="menu-delete" onclick="deleteItem(${m.id})">🗑️</span>
                </div>
            `).join('');
        }
        function showAddModal(){
            document.getElementById('modalTitle').textContent='➕ إضافة صنف';
            document.getElementById('itemName').value='';
            document.getElementById('itemPrice').value='';
            document.getElementById('editId').value='';
            document.getElementById('addModal').style.display='flex';
        }
        function editItem(id){
            const m=menu.find(i=>i.id===id);
            if(!m)return;
            document.getElementById('modalTitle').textContent='✏️ تعديل صنف';
            document.getElementById('itemName').value=m.name;
            document.getElementById('itemPrice').value=m.price;
            document.getElementById('itemIcon').value=m.icon;
            document.getElementById('editId').value=id;
            document.getElementById('addModal').style.display='flex';
        }
        function closeModal(){document.getElementById('addModal').style.display='none'}
        function saveItem(){
            const name=document.getElementById('itemName').value.trim();
            const price=parseFloat(document.getElementById('itemPrice').value);
            const icon=document.getElementById('itemIcon').value;
            const editId=document.getElementById('editId').value;
            if(!name||!price)return;
            if(editId){
                const m=menu.find(i=>i.id===parseInt(editId));
                if(m){m.name=name;m.price=price;m.icon=icon}
            } else {
                menu.push({id:Date.now(),name,price,icon});
            }
            save();render();closeModal();
        }
        function deleteItem(id){if(!confirm('حذف هذا الصنف؟'))return;menu=menu.filter(m=>m.id!==id);save();render();}
        render();
    </script>
</body>
</html>
