<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Thana Restaurant</title>
    <link rel="stylesheet" href="theme-v2.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0b0f">
    <script src="auth-v2.js"></script>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .login-container { max-width: 420px; width: 100%; text-align: center; }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 32px 24px;
            box-shadow: var(--shadow-lg);
        }
        .login-logo { font-size: 56px; margin-bottom: 8px; }
        .login-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--gold);
            font-family: var(--font-display);
        }
        .login-subtitle { color: var(--text-secondary); font-size: 13px; margin: 8px 0 24px; }

        .pin-display {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 16px 0;
        }
        .pin-dot {
            width: 18px; height: 18px;
            border-radius: 50%;
            border: 2px solid var(--border-hover);
            transition: all var(--transition);
        }
        .pin-dot.filled {
            background: var(--gold);
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(212,168,83,0.4);
        }
        .pin-dot.error {
            background: var(--danger);
            border-color: var(--danger);
            animation: shake 0.5s;
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .pin-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            max-width: 240px;
            margin: 0 auto;
        }
        .pin-key {
            padding: 16px;
            border-radius: var(--radius);
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            font-family: var(--font);
        }
        .pin-key:hover { background: var(--border-hover); }
        .pin-key:active { transform: scale(0.9); }

        .login-msg {
            margin-top: 12px;
            min-height: 22px;
            font-size: 14px;
            font-weight: 600;
        }
        .login-msg.error { color: var(--danger); }
        .login-msg.success { color: var(--success); }

        .quick-pins {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .quick-pin {
            padding: 8px 14px;
            border-radius: var(--radius-full);
            font-size: 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            font-family: var(--font);
            transition: all var(--transition);
        }
        .quick-pin:hover { border-color: var(--gold); color: var(--gold); }

        .info-text {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 16px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">🍽️</div>
            <div class="login-title">Thana Restaurant</div>
            <div class="login-subtitle">أدخل رمز PIN للدخول</div>

            <div class="pin-display" id="pinDots">
                <span class="pin-dot"></span>
                <span class="pin-dot"></span>
                <span class="pin-dot"></span>
                <span class="pin-dot"></span>
            </div>

            <div class="login-msg" id="loginMsg"></div>

            <div class="pin-pad" id="pinPad"></div>

            <div class="quick-pins">
                <span style="color:var(--text-muted);font-size:11px;width:100%;text-align:center;margin-bottom:4px;">👆 حسابات تجريبية - اضغط للدخول السريع</span>
                <button class="quick-pin" onclick="quickLogin('2026')">🔑 مدير</button>
                <button class="quick-pin" onclick="quickLogin('1111')">📋 نادل</button>
                <button class="quick-pin" onclick="quickLogin('2222')">🍳 مطبخ</button>
                <button class="quick-pin" onclick="quickLogin('3333')">💰 كاشير</button>
            </div>

            <div class="info-text">
                💡 أدخل PIN من 4 أرقام أو اختر حساب جاهز
            </div>
        </div>
    </div>

    <script>
        let enteredPin = '';

        function buildPinPad() {
            const pad = document.getElementById('pinPad');
            const keys = ['1','2','3','4','5','6','7','8','9','⌫','0','✓'];
            pad.innerHTML = keys.map(k => {
                let cls = 'pin-key';
                return `<button class="${cls}" onclick="pinPress('${k}')">${k}</button>`;
            }).join('');
        }

        function pinPress(key) {
            const msg = document.getElementById('loginMsg');
            msg.textContent = '';
            msg.className = 'login-msg';

            if (key === '⌫') {
                enteredPin = enteredPin.slice(0, -1);
            } else if (key === '✓') {
                doLogin();
                return;
            } else {
                if (enteredPin.length < 4) {
                    enteredPin += key;
                    if (enteredPin.length === 4) {
                        setTimeout(doLogin, 300);
                    }
                }
            }
            updateDots();
        }

        function updateDots() {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((d, i) => {
                d.classList.toggle('filled', i < enteredPin.length);
                d.classList.remove('error');
            });
        }

        function showError() {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach(d => d.classList.add('error'));
            setTimeout(() => dots.forEach(d => d.classList.remove('error', 'filled')), 500);
            enteredPin = '';
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        }

        function doLogin() {
            if (enteredPin.length === 0) return;

            const result = login(enteredPin);
            const msg = document.getElementById('loginMsg');

            if (result.success) {
                msg.textContent = result.message;
                msg.className = 'login-msg success';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 500);
            } else {
                msg.textContent = result.message;
                msg.className = 'login-msg error';
                showError();
            }
        }

        function quickLogin(pin) {
            enteredPin = pin;
            updateDots();
            setTimeout(doLogin, 200);
        }

        // فحص جلسة سابقة
        if (typeof isLoggedIn === 'function' && isLoggedIn()) {
            document.getElementById('loginMsg').textContent = '✅ مرحباً بعودتك!';
            document.getElementById('loginMsg').className = 'login-msg success';
            setTimeout(() => { window.location.href = 'index.html'; }, 500);
        }

        buildPinPad();
    </script>
</body>
</html>
