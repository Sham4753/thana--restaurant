<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thana Restaurant - دخول</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:#0a0b0f;
            font-family:'Cairo','Segoe UI',sans-serif;
            display:flex;align-items:center;justify-content:center;
            min-height:100vh;padding:16px;
        }
        .box{max-width:400px;width:100%}
        
        .card{
            background:#161820;
            border:1px solid rgba(255,255,255,0.06);
            border-radius:20px;padding:30px 22px;text-align:center;
        }
        .logo{font-size:50px;margin-bottom:4px}
        .title{font-size:22px;font-weight:800;color:#d4a853;margin-bottom:2px}
        .sub{font-size:11px;color:#6b6760;margin-bottom:18px}

        /* اختيار الدور */
        .roles{
            display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px;
        }
        .role{
            background:rgba(255,255,255,0.02);border:2px solid rgba(255,255,255,0.06);
            border-radius:12px;padding:10px 5px;cursor:pointer;text-align:center;
            transition:all 0.2s;
        }
        .role:hover{border-color:rgba(212,168,83,0.3)}
        .role.sel{border-color:#d4a853;background:rgba(212,168,83,0.08)}
        .role .ri{font-size:22px;display:block}
        .role .rn{font-size:9px;font-weight:600;color:#e8e4dd;margin-top:2px}
        .role .rp{font-size:8px;color:#6b6760}

        /* بصمة */
        .fp{
            width:60px;height:60px;border-radius:50%;
            background:rgba(212,168,83,0.05);border:2px dashed rgba(212,168,83,0.2);
            margin:10px auto;display:flex;align-items:center;justify-content:center;
            cursor:pointer;transition:all 0.3s;font-size:28px;
        }
        .fp:hover{border-color:#d4a853;background:rgba(212,168,83,0.1);transform:scale(1.05)}
        .fp-text{font-size:9px;color:#6b6760;margin:4px 0 10px}

        /* PIN dots */
        .dots{display:flex;gap:8px;justify-content:center;margin:12px 0}
        .dots span{
            width:14px;height:14px;border-radius:50%;
            border:2px solid rgba(255,255,255,0.15);transition:all 0.2s;
        }
        .dots span.f{background:#d4a853;border-color:#d4a853}
        .dots span.e{background:#ef4444;border-color:#ef4444}

        /* PIN pad */
        .pad{
            display:grid;grid-template-columns:1fr 1fr 1fr;
            gap:5px;max-width:210px;margin:0 auto;
        }
        .pad button{
            padding:13px;border-radius:10px;
            background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
            color:#fff;font-size:16px;font-weight:600;cursor:pointer;
            font-family:'Cairo',sans-serif;transition:all 0.15s;
        }
        .pad button:active{background:rgba(212,168,83,0.25);transform:scale(0.93)}

        .msg{min-height:20px;font-size:13px;font-weight:600;margin:8px 0}
        .msg.e{color:#ef4444}.msg.s{color:#10b981}

        /* أزرار سريعة */
        .quick{
            margin-top:14px;padding-top:14px;
            border-top:1px solid rgba(255,255,255,0.06);
            display:flex;flex-wrap:wrap;gap:5px;justify-content:center;
        }
        .quick button{
            padding:9px 14px;border-radius:20px;font-size:11px;
            background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);
            color:#a8a49e;cursor:pointer;font-family:'Cairo',sans-serif;font-weight:600;
            transition:all 0.2s;
        }
        .quick button:hover{border-color:#d4a853;color:#d4a853}

        .reset-btn{
            width:100%;margin-top:10px;padding:10px;border-radius:10px;
            background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15);
            color:#ef4444;font-weight:700;font-size:11px;cursor:pointer;
            font-family:'Cairo',sans-serif;
        }
        .reset-btn:hover{background:rgba(239,68,68,0.15)}
        
        @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
        .shake{animation:shake 0.4s}
    </style>
</head>
<body>
<div class="box">
<div class="card">
    <div class="logo">🍽️</div>
    <div class="title">Thana Restaurant</div>
    <div class="sub">اختر دورك ثم أدخل PIN أو استخدم البصمة</div>

    <!-- أدوار -->
    <div class="roles" id="roles">
        <div class="role sel" data-pin="2026" data-role="admin" onclick="selectRole(this)">
            <span class="ri">🔑</span><span class="rn">مدير</span><span class="rp">2026</span>
        </div>
        <div class="role" data-pin="1111" data-role="waiter" onclick="selectRole(this)">
            <span class="ri">📋</span><span class="rn">نادل</span><span class="rp">1111</span>
        </div>
        <div class="role" data-pin="2222" data-role="kitchen" onclick="selectRole(this)">
            <span class="ri">🍳</span><span class="rn">مطبخ</span><span class="rp">2222</span>
        </div>
        <div class="role" data-pin="3333" data-role="cashier" onclick="selectRole(this)">
            <span class="ri">💰</span><span class="rn">كاشير</span><span class="rp">3333</span>
        </div>
        <div class="role" data-pin="4444" data-role="manager" onclick="selectRole(this)">
            <span class="ri">📊</span><span class="rn">مناوب</span><span class="rp">4444</span>
        </div>
        <div class="role" data-pin="guest" data-role="guest" onclick="selectRole(this)">
            <span class="ri">👁️</span><span class="rn">زائر</span><span class="rp">عرض</span>
        </div>
    </div>

    <!-- بصمة -->
    <div class="fp" id="fpBtn" onclick="loginWithFP()">🖐️</div>
    <div class="fp-text">دخول بالبصمة</div>

    <!-- PIN -->
    <div class="dots" id="dots"><span></span><span></span><span></span><span></span></div>
    <div class="msg" id="msg"></div>
    <div class="pad" id="pad"></div>

    <!-- سريع -->
    <div class="quick">
        <button onclick="quickLogin('2026')">🔑 مدير</button>
        <button onclick="quickLogin('1111')">📋 نادل</button>
        <button onclick="quickLogin('2222')">🍳 مطبخ</button>
        <button onclick="quickLogin('3333')">💰 كاشير</button>
    </div>

    <button class="install-btn" onclick="installApp()" style="display:none;width:100%;padding:10px;border-radius:10px;background:rgba(212,168,83,0.15);color:#d4a853;border:1px solid rgba(212,168,83,0.3);font-weight:700;font-size:11px;cursor:pointer;font-family:Cairo,sans-serif;margin-bottom:6px" id="installBtn">📲 تثبيت التطبيق</button>
<button class="reset-btn" onclick="localStorage.clear();location.reload()">🗑️ مسح جميع البيانات</button>
</div>
</div>

<script>
var deferredPrompt;
window.addEventListener("beforeinstallprompt",function(e){e.preventDefault();deferredPrompt=e;document.getElementById("installBtn").style.display="block"});
function installApp(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(function(r){if(r.outcome==="accepted")document.getElementById("installBtn").style.display="none"})}}

// ========== بيانات المستخدمين ==========
var USERS = {
    '2026': {n:'المدير',r:'admin'},
    '1111': {n:'النادل',r:'waiter'},
    '2222': {n:'المطبخ',r:'kitchen'},
    '3333': {n:'الكاشير',r:'cashier'},
    '4444': {n:'مدير مناوب',r:'manager'},
    'guest':{n:'زائر',r:'guest'}
};

var pin = '';

// ========== اختيار الدور ==========
function selectRole(el){
    document.querySelectorAll('.role').forEach(function(r){r.classList.remove('sel')});
    el.classList.add('sel');
    pin = '';
    showDots();
    document.getElementById('msg').textContent = '';
    document.getElementById('msg').className = 'msg';
}

// ========== PIN Pad ==========
function showDots(){
    document.querySelectorAll('#dots span').forEach(function(d,i){
        d.classList.toggle('f', i < pin.length);
        d.classList.remove('e');
    });
}

function addKey(k){
    document.getElementById('msg').textContent = '';
    document.getElementById('msg').className = 'msg';
    
    if(k === 'C'){ pin = ''; }
    else if(k === '⌫'){ pin = pin.slice(0, -1); }
    else if(k === '✓'){ doLogin(); return; }
    else { if(pin.length < 4){ pin += k; if(pin.length === 4) setTimeout(doLogin, 250); } }
    showDots();
}

function doLogin(){
    var m = document.getElementById('msg');
    if(USERS[pin]){
        var u = USERS[pin];
        localStorage.setItem('thana_auth_session', JSON.stringify({
            role: u.r, userId: u.r, loginTime: new Date().toISOString()
        }));
        m.textContent = '✅ مرحباً ' + u.n + '...';
        m.className = 'msg s';
        if(u.r === 'guest'){ setTimeout(function(){ location.href = 'qr-menu.html?table=1'; }, 400); }
        else if(u.r==='waiter'){ setTimeout(function(){ location.href='waiter.html'; }, 400); }
        else if(u.r==='kitchen'){ setTimeout(function(){ location.href='kitchen.html'; }, 400); }
        else if(u.r==='cashier'){ setTimeout(function(){ location.href='orders.html'; }, 400); }
        else { if(u.r==='waiter'){ setTimeout(function(){ location.href='waiter.html'; }, 400); }
        else if(u.r==='kitchen'){ setTimeout(function(){ location.href='kitchen.html'; }, 400); }
        else if(u.r==='cashier'){ setTimeout(function(){ location.href='orders.html'; }, 400); }
        else { setTimeout(function(){ location.href='index.html'; }, 400); } }
    } else {
        m.textContent = '❌ PIN خطأ';
        m.className = 'msg e';
        var dots = document.querySelectorAll('#dots span');
        dots.forEach(function(d){ d.classList.add('e'); });
        var card = document.querySelector('.card');
        card.classList.add('shake');
        setTimeout(function(){ card.classList.remove('shake'); }, 400);
        if(navigator.vibrate) navigator.vibrate(100);
        pin = '';
        showDots();
    }
}

function quickLogin(p){ pin = p; showDots(); doLogin(); }

// ========== بصمة ==========
function loginWithFP(){
    var m = document.getElementById('msg');
    if(!window.PublicKeyCredential){
        m.textContent = '⚠️ جهازك لا يدعم البصمة';
        m.className = 'msg e';
        return;
    }
    m.textContent = '🖐️ ضع إصبعك...';
    m.className = 'msg';
    
    var challenge = new Uint8Array(32);
    crypto.getRandomValues(challenge);
    
    navigator.credentials.get({
        publicKey: { challenge: challenge, timeout: 30000, userVerification: 'required', rpId: window.location.hostname }
    }).then(function(){
        localStorage.setItem('thana_auth_session', JSON.stringify({role:'admin',userId:'admin',loginTime:new Date().toISOString()}));
        m.textContent = '✅ تم التحقق!';
        m.className = 'msg s';
        if(u.r==='waiter'){ setTimeout(function(){ location.href='waiter.html'; }, 400); }
        else if(u.r==='kitchen'){ setTimeout(function(){ location.href='kitchen.html'; }, 400); }
        else if(u.r==='cashier'){ setTimeout(function(){ location.href='orders.html'; }, 400); }
        else { setTimeout(function(){ location.href='index.html'; }, 400); }
    }).catch(function(){
        m.textContent = '❌ فشل - استخدم PIN';
        m.className = 'msg e';
    });
}

// ========== بناء لوحة الأرقام ==========
var pad = document.getElementById('pad');
'123456789C0⌫✓'.split('').forEach(function(k){
    var b = document.createElement('button');
    b.textContent = k;
    b.onclick = function(){ addKey(k); };
    pad.appendChild(b);
});

// ========== تسجيل بصمة سابقة ==========
if(localStorage.getItem('thana_biometric_registered') === 'true'){
    document.getElementById('fpBtn').style.border = '2px solid #10b981';
    document.getElementById('fpBtn').style.background = 'rgba(16,185,129,0.08)';
}
</script>
</body>
</html>
