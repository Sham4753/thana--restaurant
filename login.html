<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thana - دخول</title>
    <link rel="stylesheet" href="theme-v2.css">
    <style>
        *{margin:0;padding:0}
        body{background:#0a0b0f;font-family:'Cairo',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
        .c{background:#161820;border-radius:18px;padding:28px 18px;text-align:center;max-width:360px;width:100%;border:1px solid rgba(255,255,255,0.06)}
        h1{color:#d4a853;font-size:20px;margin:6px 0}
        p{color:#a8a49e;font-size:11px;margin-bottom:16px}
        .dots{display:flex;gap:8px;justify-content:center;margin:12px 0}
        .dots span{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.2)}
        .dots span.f{background:#d4a853;border-color:#d4a853}
        .pad{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;max-width:210px;margin:0 auto}
        .pad button{padding:13px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#fff;font-size:17px;font-weight:600;cursor:pointer;font-family:'Cairo',sans-serif}
        .msg{min-height:20px;font-size:13px;font-weight:600;margin:8px 0}
        .msg.e{color:#ef4444}.msg.s{color:#10b981}
        .btns{margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.06);display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
        .btns button{padding:9px 12px;border-radius:20px;font-size:11px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);color:#a8a49e;cursor:pointer;font-family:'Cairo',sans-serif;font-weight:600}
        .re{width:100%;margin-top:10px;padding:10px;border-radius:10px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#ef4444;font-weight:700;font-size:11px;cursor:pointer;font-family:'Cairo',sans-serif}
    </style>
</head>
<body>
<div class="c">
    <div style="font-size:44px">🍽️</div>
    <h1>Thana Restaurant</h1>
    <p>أدخل PIN للدخول</p>
    <div class="dots" id="dots"><span></span><span></span><span></span><span></span></div>
    <div class="msg" id="msg"></div>
    <div class="pad" id="pad"></div>
    <div class="btns">
        <button onclick="go('2026')">🔑 مدير</button>
        <button onclick="go('1111')">📋 نادل</button>
        <button onclick="go('2222')">🍳 مطبخ</button>
        <button onclick="go('3333')">💰 كاشير</button>
    </div>
    <button class="re" onclick="localStorage.clear();location.reload()">🗑️ مسح البيانات</button>
</div>
<script>
var U={'2026':{n:'المدير',r:'admin'},'1111':{n:'النادل',r:'waiter'},'2222':{n:'المطبخ',r:'kitchen'},'3333':{n:'الكاشير',r:'cashier'},'4444':{n:'مدير',r:'manager'}};
var P='';
function D(){document.querySelectorAll('#dots span').forEach(function(d,i){d.classList.toggle('f',i<P.length)})}
function go(p){P=p;D();setTimeout(C,200)}
function C(){
    var m=document.getElementById('msg');
    if(U[P]){
        var u=U[P];
        localStorage.setItem('thana_auth_session',JSON.stringify({role:u.r}));
        m.textContent='✅ '+u.n;m.className='msg s';
        var pages={admin:(localStorage.getItem('thana_pins')===null?'pin-settings.html':'index.html'),waiter:'waiter.html',kitchen:'kitchen.html',cashier:'orders.html',manager:'index.html'};
        setTimeout(function(){location.href=pages[u.r]||'index.html'},400);
    }else{m.textContent='❌ غلط - جرب 2026';m.className='msg e';P='';D()}
}
function T(k){
    document.getElementById('msg').textContent='';document.getElementById('msg').className='msg';
    if(k==='C')P='';else if(k==='⌫')P=P.slice(0,-1);else if(k==='✓'){C();return}else{if(P.length<4){P+=k;if(P.length===4)setTimeout(C,300)}}
    D();
}
var pad=document.getElementById('pad');
'123456789C0⌫✓'.split('').forEach(function(k){var b=document.createElement('button');b.textContent=k;b.onclick=function(){T(k)};pad.appendChild(b)});
</script>
</body>
</html>
