<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Thana Restaurant</title>
    <link rel="stylesheet" href="theme-v2.css?v=final">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            min-height:100vh;display:flex;align-items:center;justify-content:center;
            padding:16px;background:#0a0b0f;font-family:'Cairo','Segoe UI',sans-serif;
        }
        .box{max-width:400px;width:100%;text-align:center}
        .card{
            background:#161820;border:1px solid rgba(255,255,255,0.06);
            border-radius:18px;padding:28px 20px;
        }
        .logo{font-size:52px;margin-bottom:4px}
        .title{font-size:24px;font-weight:800;color:#d4a853;margin-bottom:4px}
        .sub{color:#a8a49e;font-size:12px;margin-bottom:18px}

        .roles{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
        .role{
            background:rgba(255,255,255,0.02);border:2px solid rgba(255,255,255,0.06);
            border-radius:10px;padding:10px 6px;cursor:pointer;text-align:center;transition:all 0.2s;
        }
        .role.sel{border-color:#d4a853;background:rgba(212,168,83,0.08)}
        .role .ri{font-size:24px;display:block}
        .role .rn{font-size:10px;font-weight:600;color:#e8e4dd;margin-top:2px}
        .role .rh{font-size:8px;color:#6b6760}

        .dots{display:flex;gap:8px;justify-content:center;margin:12px 0}
        .dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);transition:all 0.2s}
        .dot.f{background:#d4a853;border-color:#d4a853}
        .dot.e{background:#ef4444;border-color:#ef4444}

        .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;max-width:210px;margin:0 auto}
        .key{
            padding:13px;border-radius:10px;background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.08);color:#fff;font-size:17px;
            font-weight:600;cursor:pointer;font-family:'Cairo',sans-serif;
        }
        .key:active{background:rgba(212,168,83,0.2)}

        .msg{margin-top:8px;font-size:13px;font-weight:600;min-height:20px}
        .msg.e{color:#ef4444}.msg.s{color:#10b981}

        .btns{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.06)}
        .qp{
            padding:6px 10px;border-radius:20px;font-size:10px;
            background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);
            color:#a8a49e;cursor:pointer;font-family:'Cairo',sans-serif;
        }
        .qp:hover{border-color:#d4a853;color:#d4a853}

        .reset{
            display:block;width:100%;padding:10px;border-radius:10px;font-size:12px;
            font-weight:700;cursor:pointer;margin-top:8px;font-family:'Cairo',sans-serif;
            background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.2);
        }
    </style>
</head>
<body>
<div class="box">
<div class="card">
<div class="logo">🍽️</div>
<div class="title">Thana Restaurant</div>
<div class="sub">نظام إدارة مطعم متكامل</div>

<div class="roles" id="roles">
<div class="role sel" data-pin="2026" data-role="admin" onclick="sr(this)"><span class="ri">🔑</span><span class="rn">المدير</span><span class="rh">PIN:2026</span></div>
<div class="role" data-pin="1111" data-role="waiter" onclick="sr(this)"><span class="ri">📋</span><span class="rn">النادل</span><span class="rh">PIN:1111</span></div>
<div class="role" data-pin="2222" data-role="kitchen" onclick="sr(this)"><span class="ri">🍳</span><span class="rn">المطبخ</span><span class="rh">PIN:2222</span></div>
<div class="role" data-pin="3333" data-role="cashier" onclick="sr(this)"><span class="ri">💰</span><span class="rn">الكاشير</span><span class="rh">PIN:3333</span></div>
</div>

<div class="dots" id="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
<div class="msg" id="msg"></div>
<div class="pad" id="pad"></div>

<div class="btns">
<button class="qp" onclick="ql('2026')">🔑 مدير (2026)</button>
<button class="qp" onclick="ql('1111')">📋 نادل</button>
<button class="qp" onclick="ql('2222')">🍳 مطبخ</button>
<button class="qp" onclick="ql('3333')">💰 كاشير</button>
</div>

<button class="reset" onclick="localStorage.clear();location.reload();">🗑️ مسح البيانات وإعادة ضبط</button>
</div>
</div>

<script>
var U={'2026':{n:'المدير',r:'admin'},'1111':{n:'النادل',r:'waiter'},'2222':{n:'المطبخ',r:'kitchen'},'3333':{n:'الكاشير',r:'cashier'},'4444':{n:'مدير مناوب',r:'manager'}};
var pin='';
function sr(c){
    document.querySelectorAll('.role').forEach(function(x){x.classList.remove('sel')});
    c.classList.add('sel');pin='';ud();document.getElementById('msg').textContent='';document.getElementById('msg').className='msg';
}
function ud(){
    document.querySelectorAll('.dot').forEach(function(d,i){
        d.classList.toggle('f',i<pin.length);d.classList.remove('e');
    });
}
function dl(){
    if(U[pin]){
        var u=U[pin];
        localStorage.setItem('thana_auth_session',JSON.stringify({userId:u.r,role:u.r,loginTime:new Date().toISOString()}));
        document.getElementById('msg').textContent='✅ مرحباً '+u.n+'!';
        document.getElementById('msg').className='msg s';
        setTimeout(function(){location.href='index.html';},500);
    }else{
        document.getElementById('msg').textContent='❌ رمز PIN غير صحيح';
        document.getElementById('msg').className='msg e';
        document.querySelectorAll('.dot').forEach(function(d){d.classList.add('e')});
        setTimeout(function(){document.querySelectorAll('.dot').forEach(function(d){d.classList.remove('e','f')});},500);
        pin='';
    }
}
function ql(p){pin=p;ud();dl();}
function pp(k){
    document.getElementById('msg').textContent='';document.getElementById('msg').className='msg';
    if(k==='⌫'){pin=pin.slice(0,-1)}
    else if(k==='✓'){dl();return}
    else{if(pin.length<4){pin+=k;if(pin.length===4)setTimeout(dl,300)}}
    ud();
}
document.getElementById('pad').innerHTML=['1','2','3','4','5','6','7','8','9','⌫','0','✓'].map(function(k){return '<button class="key" onclick="pp(\''+k+'\')">'+k+'</button>';}).join('');
</script>
</body>
</html>
