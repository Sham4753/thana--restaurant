<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Thana</title>
    <style>
        body{background:#0a0b0f;font-family:'Cairo',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:16px}
        .box{background:#161820;border-radius:18px;padding:30px 20px;text-align:center;max-width:380px;width:100%;border:1px solid rgba(255,255,255,0.06)}
        h1{color:#d4a853;margin:0 0 4px;font-size:22px}
        p{color:#a8a49e;font-size:12px;margin:0 0 20px}
        .pin{display:flex;gap:8px;justify-content:center;margin:16px 0}
        .pin div{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,0.2)}
        .pin div.on{background:#d4a853;border-color:#d4a853}
        .nums{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;max-width:240px;margin:0 auto}
        .nums button{padding:14px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#fff;font-size:18px;font-weight:600;cursor:pointer;font-family:'Cairo',sans-serif}
        .nums button:active{background:rgba(212,168,83,0.3)}
        .msg{min-height:22px;font-size:14px;font-weight:600;margin:10px 0}
        .msg.bad{color:#ef4444}.msg.good{color:#10b981}
        .btns{margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.06);display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
        .btns button{padding:8px 12px;border-radius:20px;font-size:11px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);color:#a8a49e;cursor:pointer;font-family:'Cairo',sans-serif}
        .btns button:hover{border-color:#d4a853;color:#d4a853}
        .reset{width:100%;margin-top:10px;padding:10px;border-radius:10px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#ef4444;font-weight:700;font-size:12px;cursor:pointer;font-family:'Cairo',sans-serif}
    </style>
</head>
<body>
<div class="box">
    <div style="font-size:44px">🍽️</div>
    <h1>Thana Restaurant</h1>
    <p>أدخل رمز PIN للدخول</p>

    <div class="pin" id="dots">
        <div></div><div></div><div></div><div></div>
    </div>
    <div class="msg" id="msg"></div>
    <div class="nums" id="pad"></div>

    <div class="btns">
        <button onclick="go('2026')">🔑 مدير</button>
        <button onclick="go('1111')">📋 نادل</button>
        <button onclick="go('2222')">🍳 مطبخ</button>
        <button onclick="go('3333')">💰 كاشير</button>
    </div>
    <button class="reset" onclick="localStorage.clear();location.reload()">🗑️ مسح البيانات</button>
</div>

<script>
// كلمات السر مباشرة في الكود
var users = {
    '2026':{name:'المدير',role:'admin'},
    '1111':{name:'النادل',role:'waiter'},
    '2222':{name:'المطبخ',role:'kitchen'},
    '3333':{name:'الكاشير',role:'cashier'},
    '4444':{name:'مدير مناوب',role:'manager'}
};

var pin = '';

function showDots(){
    var d = document.querySelectorAll('#dots div');
    d.forEach(function(dot,i){
        if(i < pin.length) dot.classList.add('on');
        else dot.classList.remove('on');
    });
}

function go(p){
    pin = p;
    showDots();
    setTimeout(check, 200);
}

function check(){
    var m = document.getElementById('msg');
    if(users[pin]){
        var u = users[pin];
        localStorage.setItem('thana_auth_session', JSON.stringify({role: u.role}));
        m.textContent = '✅ مرحباً '+u.name;
        m.className = 'msg good';
        setTimeout(function(){ location.href = 'index.html'; }, 400);
    } else {
        m.textContent = '❌ خطأ - جرب 2026';
        m.className = 'msg bad';
        pin = '';
        showDots();
    }
}

function press(k){
    var m = document.getElementById('msg');
    m.textContent = ''; m.className = 'msg';
    if(k === 'C'){ pin = ''; }
    else if(k === '⌫'){ pin = pin.slice(0,-1); }
    else {
        if(pin.length < 4) pin += k;
        if(pin.length === 4) setTimeout(check, 300);
    }
    showDots();
}

var pad = document.getElementById('pad');
['1','2','3','4','5','6','7','8','9','C','0','⌫'].forEach(function(k){
    var b = document.createElement('button');
    b.textContent = k;
    b.onclick = function(){ press(k); };
    pad.appendChild(b);
});
</script>
</body>
</html>
