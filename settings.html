<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <link rel="stylesheet" href="theme-v2.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thana Settings</title>
    <link rel="stylesheet" href="theme.css">
<script src="nav-component.js" defer></script>
</head>
<body>
    <div class="app">
        <div class="header"><div class="header-icon">⚙️</div><div class="header-title">الإعدادات</div></div>

        <div class="card">
            <h3>🏪 اسم المطعم</h3>
            <input type="text" id="restaurantName" placeholder="اسم المطعم">
            <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="saveName()">💾 حفظ</button>
        </div>

        <div class="card">
            <h3>🔐 رمز المدير</h3>
            <input type="password" id="newPIN" placeholder="رمز جديد (4 أرقام)" maxlength="4">
            <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="changePIN()">💾 تغيير</button>
        </div>

        <div class="card">
            <h3>💾 نسخ احتياطي</h3>
            <button class="btn btn-primary" style="width:100%;margin-bottom:8px" onclick="backup()">📥 تصدير</button>
            <input type="file" id="restoreFile" accept=".json" style="display:none" onchange="restore(event)">
            <button class="btn btn-ghost" style="width:100%" onclick="document.getElementById('restoreFile').click()">📤 استيراد</button>
        </div>

        <div class="card">
            <h3>ℹ️ عن النظام</h3>
            <p>Thana Restaurant v1.0</p>
            <p>ERP ذكي للمطاعم</p>
        </div>

        </nav>
    </div>

    <script>
        document.getElementById('restaurantName').value = localStorage.getItem('thana_restaurant_name') || 'Thana Restaurant';

        function saveName() {
            const name = document.getElementById('restaurantName').value.trim();
            if (!name) return;
            localStorage.setItem('thana_restaurant_name', name);
            alert('✅ تم الحفظ');
        }

        function changePIN() {
            const pin = document.getElementById('newPIN').value.trim();
            if (pin.length !== 4) { alert('أدخل 4 أرقام'); return; }
            localStorage.setItem('thana_admin_pin', pin);
            document.getElementById('newPIN').value = '';
            alert('✅ تم تغيير الرمز');
        }

        function backup() {
            const data = {};
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('thana_')) data[key] = JSON.parse(localStorage.getItem(key));
            }
            const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'thana_backup.json';
            a.click();
        }

        function restore(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!confirm('استعادة النسخة؟')) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = JSON.parse(e.target.result);
                for (const [key, value] of Object.entries(data)) localStorage.setItem(key, JSON.stringify(value));
                alert('✅ تمت الاستعادة');
                location.reload();
            };
            reader.readAsText(file);
        }
    </script>
<script src="swipe-nav.js"></script>
</body>
</html>
