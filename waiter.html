<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النادل - Thana Restaurant</title>
    <link rel="stylesheet" href="theme-v2.css">
    <meta name="theme-color" content="#0a0b0f">
    <script src="bridge.js" defer></script>
    <script src="nav-component.js" defer></script>
    <script src="pwa-register.js" defer></script>
    <style>
        body{padding:16px;font-family:'Cairo',sans-serif;background:#0a0b0f;color:#e8e4dd}
        .container{max-width:700px;margin:0 auto}
        .header{text-align:center;padding:12px 0}
        .header h1{font-size:24px;color:#d4a853}

        .card{background:#161820;border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:16px;margin-bottom:12px}

        .form-row{display:flex;gap:8px;flex-wrap:wrap;align-items:end;margin-bottom:10px}
        .form-row label{font-size:11px;color:#a8a49e;display:block;margin-bottom:2px}
        .form-row select,.form-row input{
            padding:8px 10px;border-radius:8px;background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.08);color:#fff;font-family:'Cairo',sans-serif;font-size:13px;
        }
        .form-row select{min-width:130px}
        .form-row input[type=number]{width:60px;text-align:center}

        .btn{
            padding:10px 18px;border-radius:8px;border:none;font-weight:700;font-size:13px;
            cursor:pointer;font-family:'Cairo',sans-serif;transition:all 0.2s;
        }
        .btn:active{transform:scale(0.95)}
        .btn-gold{background:linear-gradient(135deg,#b8942e,#d4a853);color:#1a1814}
        .btn-success{background:#10b981;color:#fff}
        .btn-danger{background:rgba(239,68,68,0.12);color:#ef4444}
        .btn-outline{background:transparent;border:1px solid rgba(255,255,255,0.08);color:#fff}

        .order-preview{margin-top:10px}
        .order-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:13px}
        .order-total{text-align:center;font-size:18px;font-weight:700;padding:10px 0;color:#d4a853}

        .orders-list{margin-top:8px}
        .mini-order{background:rgba(255,255,255,0.02);padding:10px;border-radius:8px;margin-bottom:6px;font-size:12px;display:flex;justify-content:space-between;align-items:center}

        .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:10px 20px;border-radius:30px;font-weight:700;z-index:300;animation:td 0.4s ease,tu 0.4s ease 2s forwards}
        @keyframes td{from{opacity:0;transform:translateX(-50%) translateY(-80px)}}
        @keyframes tu{to{opacity:0;transform:translateX(-50%) translateY(-80px)}}
    </style>
</head>
<body>
<div class="container">
<div class="header"><div style="font-size:40px;">📋</div><h1>تسجيل الطلبات</h1></div>

<div class="card">
<div class="form-row">
<div><label>🪑 الطاولة</label><select id="tableSelect"><option value="safari">🛍️ سفري</option></select></div>
<div><label>🍽️ الصنف</label><select id="itemSelect"></select></div>
<div><label>🔢 الكمية</label><input type="number" id="itemQty" value="1" min="1" max="99"></div>
<div style="display:flex;align-items:end;"><button class="btn btn-gold" onclick="addToOrder()">➕ إضافة</button></div>
</div>

<div class="order-preview" id="orderPreview">
<p style="color:#6b6760;text-align:center;">لا توجد أصناف مضافة</p>
</div>
<div class="order-total" id="orderTotal" style="display:none;"></div>

<div style="display:flex;gap:6px;margin-top:8px;">
<input type="text" id="orderNote" placeholder="ملاحظة (اختياري)..." style="flex:1;padding:8px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#fff;font-family:'Cairo',sans-serif;font-size:12px;">
<button class="btn btn-success" onclick="submitOrder()">📤 إرسال للمطبخ</button>
</div>
<button class="btn btn-danger" onclick="clearOrder()" style="width:100%;margin-top:6px;">🗑️ تفريغ الطلب</button>
</div>

<div class="card">
<h3 style="color:#d4a853;margin-bottom:10px;">📋 آخر الطلبات اليوم</h3>
<div class="orders-list" id="recentOrders"></div>
</div>
</div>

<script>
var currentOrder=[];
var currentTable=1;

function loadTables(){
    var tables=JSON.parse(localStorage.getItem('thana_tables')||'[]');
    if(tables.length===0) tables=Array.from({length:15},function(_,i){return{id:i+1,status:'free'}});
    var sel=document.getElementById('tableSelect');
    sel.innerHTML=tables.map(function(t){return'<option value="'+t.id+'">طاولة '+t.id+' ('+(t.status==='free'?'متاحة':'مشغولة')+')</option>'}).join('');
}
function loadMenu(){
    var menu=JSON.parse(localStorage.getItem('thana_menu')||'[]');
    if(menu.length===0){
        menu=[
            {name:'شاورما دجاج',price:25000},{name:'شاورما لحم',price:30000},
            {name:'فلافل',price:15000},{name:'برجر',price:35000},
            {name:'مشاوي مشكل',price:50000},{name:'تبولة',price:10000},
            {name:'حمص',price:10000},{name:'بطاطا مقلية',price:8000},
            {name:'كولا',price:5000},{name:'عصير برتقال',price:7000},
            {name:'ماء',price:2000},{name:'كنافة',price:20000}
        ];
    }
    var sel=document.getElementById('itemSelect');
    sel.innerHTML=menu.map(function(i){return'<option value="'+i.name+'">'+i.name+' - '+(i.price||0).toLocaleString()+' ل.س</option>'}).join('');
}

function addToOrder(){
    var itemName=document.getElementById('itemSelect').value;
    var qty=parseInt(document.getElementById('itemQty').value)||1;
    if(!itemName)return;
    
    var menu=JSON.parse(localStorage.getItem('thana_menu')||'[]');
    if(menu.length===0){
        menu=[{name:'شاورما دجاج',price:25000},{name:'شاورما لحم',price:30000},{name:'فلافل',price:15000},{name:'برجر',price:35000},{name:'مشاوي مشكل',price:50000},{name:'تبولة',price:10000},{name:'حمص',price:10000},{name:'بطاطا مقلية',price:8000},{name:'كولا',price:5000},{name:'عصير برتقال',price:7000},{name:'ماء',price:2000},{name:'كنافة',price:20000}];
    }
    var menuItem=menu.find(function(i){return i.name===itemName});
    var price=menuItem?menuItem.price:0;
    
    var existing=currentOrder.find(function(i){return i.name===itemName});
    if(existing){existing.qty+=qty}else{currentOrder.push({name:itemName,price:price,qty:qty})}
    renderOrder();
    if(navigator.vibrate)navigator.vibrate(20);
}

function removeFromOrder(index){currentOrder.splice(index,1);renderOrder()}
function clearOrder(){currentOrder=[];renderOrder()}

function renderOrder(){
    var container=document.getElementById('orderPreview');
    var totalEl=document.getElementById('orderTotal');
    
    if(currentOrder.length===0){
        container.innerHTML='<p style="color:#6b6760;text-align:center;">لا توجد أصناف مضافة</p>';
        totalEl.style.display='none';
        return;
    }
    
    var total=currentOrder.reduce(function(s,i){return s+(i.price*i.qty)},0);
    container.innerHTML=currentOrder.map(function(item,idx){
        return'<div class="order-item"><span>'+item.name+' ×'+item.qty+'</span><span>'+(item.price*item.qty).toLocaleString()+' ل.س <span onclick="removeFromOrder('+idx+')" style="color:#ef4444;cursor:pointer;">✕</span></span></div>';
    }).join('');
    
    totalEl.style.display='block';
    totalEl.textContent='💰 المجموع: '+total.toLocaleString()+' ل.س';
}

function submitOrder(){
    if(currentOrder.length===0){showToast('⚠️ أضف أصناف أولاً');return}
    
    var table=parseInt(document.getElementById('tableSelect').value)||1;
    var note=document.getElementById('orderNote').value;
    var total=currentOrder.reduce(function(s,i){return s+(i.price*i.qty)},0);
    
    var order={
        id:Date.now(),table:table,
        items:currentOrder.map(function(i){return{name:i.name,price:i.price,qty:i.qty}}),
        total:total,note:note,status:'new',
        timestamp:new Date().toISOString(),source:'waiter'
    };
    
    var orders=JSON.parse(localStorage.getItem('thana_orders')||'[]');
    orders.push(order);
    localStorage.setItem('thana_orders',JSON.stringify(orders));
    localStorage.setItem('thana_new_order_notify',JSON.stringify(order));
    
    // تحديث الطاولة
    var tables=JSON.parse(localStorage.getItem('thana_tables')||'[]');
    var t=tables.find(function(tbl){return tbl.id==table});
    if(t){t.status='busy';localStorage.setItem('thana_tables',JSON.stringify(tables))}
    
    currentOrder=[];document.getElementById('orderNote').value='';
    renderOrder();loadTables();loadRecent();setInterval(function(){var ready=localStorage.getItem('thana_order_ready');if(ready){alert('✅ طلب #'+ready+' جاهز للتقديم!');localStorage.removeItem('thana_order_ready')}},3000);
    showToast('✅ تم إرسال الطلب للمطبخ!');
}

function loadRecent(){
    var orders=JSON.parse(localStorage.getItem('thana_orders')||'[]');
    var today=new Date().toLocaleDateString('ar-SA');
    var recent=orders.filter(function(o){return new Date(o.timestamp||Date.now()).toLocaleDateString('ar-SA')===today}).slice(-8).reverse();
    var container=document.getElementById('recentOrders');
    if(recent.length===0){container.innerHTML='<p style="color:#6b6760;text-align:center;">لا توجد طلبات</p>';return}
    container.innerHTML=recent.map(function(o){
        return'<div class="mini-order"><div>🪑'+o.table+' - '+(o.items||[]).map(function(i){return i.name+'×'+(i.qty||1)}).join(', ')+'</div><div style="color:#d4a853;">'+(o.total||0).toLocaleString()+' ل.س</div></div>';
    }).join('');
}

function showToast(msg){
    var t=document.querySelector('.toast');if(t)t.remove();
    t=document.createElement('div');t.className='toast';t.textContent=msg;
    document.body.appendChild(t);setTimeout(function(){t.remove()},2500);
}

loadTables();loadMenu();renderOrder();loadRecent();setInterval(function(){var ready=localStorage.getItem('thana_order_ready');if(ready){alert('✅ طلب #'+ready+' جاهز للتقديم!');localStorage.removeItem('thana_order_ready')}},3000);
</script>
<script src="swipe-nav.js"></script>
</body>
</html>
