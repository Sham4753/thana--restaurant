<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <link rel="stylesheet" href="theme-v2.css?v=2.1">
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Thana Procurement</title>
    <link rel="stylesheet" href="theme.css">
<script src="dark-mode.js"></script>
<script src="nav-component.js?v=2.1" defer></script>
</head>
<body>
    <div class="app">
        <div class="header"><div class="header-icon">🛒</div><div class="header-title">قائمة المشتريات</div></div>
        <div class="card"><h3>📋 المشتريات المقترحة</h3><div id="procurementList"></div></div>
        <button class="btn btn-primary" style="width:100%;margin-top:12px" onclick="shareWhatsApp()">📤 مشاركة عبر واتساب</button>
    </div>
    <script>
        const inventory=JSON.parse(localStorage.getItem('thana_inventory')||'[]');
        const needed=inventory.filter(i=>i.qty<=i.min*2);
        document.getElementById('procurementList').innerHTML=needed.length>0?
            needed.map(i=>`<p>📦 ${i.name}: اشتري ${Math.ceil(i.min*3-i.qty)} ${i.unit}</p>`).join(''):
            '<p style="opacity:0.5">✅ كل المواد متوفرة</p>';
        function shareWhatsApp(){
            const text=needed.map(i=>`📦 ${i.name}: ${Math.ceil(i.min*3-i.qty)} ${i.unit}`).join('%0A');
            window.open(`https://wa.me/?text=🛒 قائمة مشتريات:%0A${text}`,'_blank');
        }
    </script>

</body>
</html>
