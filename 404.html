<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصفحة غير موجودة - Thana Restaurant</title>
    <link rel="stylesheet" href="theme-v2.css?v=2.1">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .error-code {
            font-family: var(--font-display);
            font-size: 100px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold), var(--burgundy-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }
        .error-icon { font-size: 56px; margin-bottom: 12px; }
        .error-title {
            font-family: var(--font-display);
            font-size: 24px;
            color: var(--gold);
            margin: 10px 0;
        }
        .error-desc {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.8;
        }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            border-radius: var(--radius);
            background: linear-gradient(135deg, var(--gold-dark), var(--gold));
            color: #1a1814;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            transition: all var(--transition);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212,168,83,0.3);
        }
    </style>
</head>
<body>
    <div>
        <div class="error-icon">🍽️</div>
        <div class="error-code">404</div>
        <div class="error-title">الصفحة غير موجودة</div>
        <div class="error-desc">
            عذراً، الصفحة اللي تبحث عنها مش موجودة<br>
            يمكن يكون الرابط غلط أو الصفحة انحذفت
        </div>
        <a href="index.html" class="btn">🏠 العودة للرئيسية</a>
    </div>
</body>
</html>
