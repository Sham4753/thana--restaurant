<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="theme.css">
<title>Thana Inventory</title>
    <link rel="stylesheet" href="inventory.css">
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="header-left">
                <div class="header-icon">📦</div>
                <div class="header-title">إدارة المخزون</div>
            </div>
            <div class="header-badge" id="alertCount">0</div>
        </div>

        <button class="btn-add" onclick="toggleForm()">➕ إضافة توريد</button>

        <div class="add-form" id="addForm" style="display:none">
            <select id="itemSelect"></select>
            <input type="number" id="addQty" placeholder="الكمية" min="1" value="1">
            <button class="btn-save" onclick="addStock()">💾 حفظ</button>
        </div>

        <div class="inventory-grid" id="inventoryGrid"></div>
    </div>
    <script src="inventory.js"></script>
