<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><title>اختبار التدفق</title>
<style>
    body{font-family:'Cairo',sans-serif;background:#0a0b0f;color:#e8e4dd;padding:16px}
    .btn{display:block;width:100%;padding:14px;margin:8px 0;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif}
    .btn-qr{background:#a78bfa;color:#fff}
    .btn-kitchen{background:#f59e0b;color:#000}
    .btn-check{background:#10b981;color:#fff}
    .result{background:#161820;padding:14px;border-radius:10px;margin:10px 0;font-family:monospace;font-size:13px}
</style>
</head>
<body>
<h2 style="color:#d4a853;text-align:center">🧪 اختبار تدفق الطلب</h2>

<button class="btn btn-qr" onclick="sendQR()">📱 1. محاكاة طلب من QR Menu (شاورما ×2)</button>
<button class="btn btn-kitchen" onclick="checkKitchen()">🍳 2. فحص المطبخ - هل وصل الطلب؟</button>
<button class="btn btn-check" onclick="clearAll()">🗑️ مسح الكل</button>

<div class="result" id="result">اضغط على الأزرار للاختبار</div>

<script>
function log(msg){document.getElementById('result').innerHTML+='\n'+msg}

function sendQR(){
    var order={
        id:Date.now(),table:'1',orderNumber:Math.floor(Math.random()*1000),
        items:[{name:'شاورما دجاج',price:25000,qty:2}],
        total:50000,status:'new',timestamp:new Date().toISOString(),source:'qr'
    };
    var orders=JSON.parse(localStorage.getItem('thana_orders')||'[]');
    orders.push(order);
    localStorage.setItem('thana_orders',JSON.stringify(orders));
    document.getElementById('result').textContent='✅ تم إرسال طلب #'+order.orderNumber+'\nالعدد الحالي: '+orders.length;
}

function checkKitchen(){
    var orders=JSON.parse(localStorage.getItem('thana_orders')||'[]');
    var today=new Date().toLocaleDateString('ar-SA');
    var todayOrders=orders.filter(function(o){
        return new Date(o.timestamp||Date.now()).toLocaleDateString('ar-SA')===today;
    });
    document.getElementById('result').textContent='🍳 المطبخ يشوف:\n';
    document.getElementById('result').innerHTML+='عدد الطلبات: '+todayOrders.length+'\n';
    todayOrders.forEach(function(o){
        document.getElementById('result').innerHTML+='- #'+o.orderNumber+' | '+o.table+' | '+(o.items||[]).map(function(i){return i.name+'×'+i.qty}).join(',')+' | '+o.total.toLocaleString()+' ل.س\n';
    });
}

function clearAll(){localStorage.removeItem('thana_orders');document.getElementById('result').textContent='🗑️ تم مسح الكل'}
</script>
</body>
</html>
