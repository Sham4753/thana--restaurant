<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الطباعة - Thana Restaurant</title>
    <link rel="stylesheet" href="theme-neon.css?v=2.1">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0b0f">
    <script src="dark-mode.js"></script>
<script src="nav-component.js?v=2.1" defer></script>
    <script src="update-check.js"></script>
<script src="pwa-register.js" defer></script>
    <style>
        body { padding: 16px; }
        .container { max-width: 650px; margin: 0 auto; }
        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 18px;
            margin-bottom: 14px;
            backdrop-filter: var(--glass-blur);
        }
        .card h3 { color: var(--accent-primary); margin-bottom: 12px; font-size: 16px; }

        .bt-status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            font-size: 13px;
        }
        .bt-status.off { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2); }
        .bt-status.on { background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.2); }
        .bt-dot { width: 10px; height: 10px; border-radius: 50%; }
        .bt-dot.off { background: #f87171; }
        .bt-dot.on { background: #34d399; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

        .btn {
            display: block;
            width: 100%;
            padding: 13px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 7px;
            font-family: inherit;
            transition: all 0.2s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--accent-gradient); color: #fff; }
        .btn-success { background: var(--success); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--border-medium); color: var(--text-primary); }

        .receipt-preview {
            background: #fff;
            color: #000;
            padding: 16px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
            max-width: 260px;
            margin: 10px auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .receipt-preview .center { text-align: center; }
        .receipt-preview .title { font-size: 15px; font-weight: bold; }
        .receipt-preview .line { border-top: 1px dashed #ccc; margin: 5px 0; }
        .receipt-preview .total { font-size: 15px; font-weight: bold; }

        .order-select {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            font-size: 13px;
        }
        .order-select:hover { background: rgba(255,255,255,0.06); }
        .order-select.selected { border-color: #38bdf8; background: rgba(56,189,248,0.1); }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 9px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 13px;
        }
        .setting-row input {
            padding: 8px 10px;
            border-radius: 8px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border-medium);
            color: #fff;
            font-family: inherit;
            font-size: 13px;
            width: 160px;
        }
        .setting-row input[type="number"] { width: 70px; text-align: center; }

        .toast {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: #34d399;
            color: #000;
            padding: 10px 22px;
            border-radius: 30px;
            font-weight: 700;
            z-index: 300;
            animation: slideDown 0.4s ease, slideUp 0.4s ease 2s forwards;
        }
        @keyframes slideDown { from{opacity:0;transform:translateX(-50%) translateY(-80px);} }
        @keyframes slideUp { to{opacity:0;transform:translateX(-50%) translateY(-80px);} }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h3>📡 اتصال البلوتوث</h3>
            <div class="bt-status off" id="btStatus">
                <div class="bt-dot off" id="btDot"></div>
                <span id="btText">غير متصل</span>
            </div>
            <button class="btn btn-primary" onclick="connectBluetooth()">🔍 بحث عن طابعة</button>
            <button class="btn btn-outline" onclick="disconnectBluetooth()">🔌 قطع الاتصال</button>
        </div>

        <div class="card">
            <h3>📋 اختر طلب للطباعة</h3>
            <div id="orderList"></div>
            <button class="btn btn-success" onclick="printSelected()">🖨️ طباعة الفاتورة</button>
            <button class="btn btn-outline" onclick="printTestPage()">🧪 طباعة اختبار</button>
        </div>

        <div class="card">
            <h3>📄 معاينة</h3>
            <div class="receipt-preview" id="receiptPreview">
                <div class="center title">🍽️ Thana Restaurant</div>
                <div class="center">حي المطاعم</div>
                <div class="center">0999-000-000</div>
                <div class="line"></div>
                <div class="center">${shopName}</div><div class="center">${shopAddr}</div><div class="center">${shopTel}</div><div class="line"></div><div class="center">اختر طلباً للمعاينة</div>
                <div class="line"></div>
                <div class="center" style="font-size:10px;">شكراً لزيارتكم 💙</div>
            </div>
        </div>

        <div class="card">
            <h3>⚙️ إعدادات الطباعة</h3>
            <div class="setting-row">
                <span>اسم المطعم</span>
                <input type="text" id="shopName" value="Thana Restaurant">
            </div>
            <div class="setting-row">
                <span>العنوان</span>
                <input type="text" id="shopAddress" value="حي المطاعم">
            </div>
            <div class="setting-row">
                <span>الهاتف</span>
                <input type="text" id="shopPhone" value="0999-000-000">
            </div>
            <div class="setting-row">
                <span>عدد النسخ</span>
                <input type="number" id="copyCount" value="1" min="1" max="5">
            </div>
            <div class="setting-row">
                <span>الرسالة السفلية</span>
                <input type="text" id="footerMsg" value="شكراً لزيارتكم 💙">
            </div>
            <button class="btn btn-primary" onclick="saveSettings()">💾 حفظ الإعدادات</button>
        </div>
    </div>

    <script>
        let bluetoothDevice = null;
        let gattServer = null;
        let printerCharacteristic = null;
        let printerReady = false;
        let selectedOrderId = null;

        function loadSettings() {
            const s = JSON.parse(localStorage.getItem('thana_print_settings') || '{}');
            if (s.shopName) document.getElementById('shopName').value = s.shopName;
            if (s.shopAddress) document.getElementById('shopAddress').value = s.shopAddress;
            if (s.shopPhone) document.getElementById('shopPhone').value = s.shopPhone;
            if (s.copyCount) document.getElementById('copyCount').value = s.copyCount;
            if (s.footerMsg) document.getElementById('footerMsg').value = s.footerMsg;
        }

        function saveSettings() {
            const settings = {
                shopName: document.getElementById('shopName').value,
                shopAddress: document.getElementById('shopAddress').value,
                shopPhone: document.getElementById('shopPhone').value,
                copyCount: document.getElementById('copyCount').value,
                footerMsg: document.getElementById('footerMsg').value
            };
            localStorage.setItem('thana_print_settings', JSON.stringify(settings));
            showToast('✅ تم حفظ الإعدادات');
            updatePreview();
        }

        function showToast(msg) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function updateBTStatus(status, text) {
            const el = document.getElementById('btStatus');
            const dot = document.getElementById('btDot');
            const textEl = document.getElementById('btText');
            el.className = 'bt-status ' + status;
            dot.className = 'bt-dot ' + status;
            textEl.textContent = text;
        }

        async function connectBluetooth() {
            if (!navigator.bluetooth) {
                showToast("⚠️ متصفحك لا يدعم البلوتوث - استخدم Chrome أو Edge");
                return;
            }
            try {
                const available = await navigator.bluetooth.getAvailability();
                if (!available) {
                    showToast("⚠️ البلوتوث غير مفعل - افتحه من الإعدادات");
                    return;
                }
            } catch(e) {
                showToast("⚠️ تعذر التحقق من البلوتوث - جرب الطباعة العادية");
                return;
            }
            try {
                if (!navigator.bluetooth) { showToast('⚠️ المتصفح لا يدعم البلوتوث'); return; }
                updateBTStatus('on', '🔄 جاري البحث...');
                bluetoothDevice = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb'] });
                gattServer = await bluetoothDevice.gatt.connect();
                const services = await gattServer.getPrimaryServices();
                for (const service of services) {
                    const chars = await service.getCharacteristics();
                    for (const char of chars) {
                        if (char.properties.write || char.properties.writeWithoutResponse) {
                            printerCharacteristic = char;
                            break;
                        }
                    }
                    if (printerCharacteristic) break;
                }
                printerReady = true;
                updateBTStatus('on', '✅ متصل: ' + bluetoothDevice.name);
                showToast('✅ تم الاتصال!');
                bluetoothDevice.addEventListener('gattserverdisconnected', () => {
                    printerReady = false;
                    printerCharacteristic = null;
                    updateBTStatus('off', '❌ انقطع الاتصال');
                });
            } catch (err) {
                updateBTStatus('off', '❌ فشل الاتصال');
            }
        }

        function disconnectBluetooth() {
            if (gattServer && gattServer.connected) gattServer.disconnect();
            bluetoothDevice = null;
            printerCharacteristic = null;
            printerReady = false;
            updateBTStatus('off', '🔌 غير متصل');
        }

        function loadOrders() {
            const orders = JSON.parse(localStorage.getItem('thana_orders') || '[]');
            const today = new Date().toLocaleDateString('ar-SA');
            const todayOrders = orders.filter(o => {
                const d = new Date(o.timestamp || Date.now()).toLocaleDateString('ar-SA');
                return d === today;
            }).reverse();

            const container = document.getElementById('orderList');
            if (todayOrders.length === 0) {
                container.innerHTML = '<p style="color:#94a3b8;text-align:center;padding:10px;">لا توجد طلبات اليوم</p>';
                return;
            }

            container.innerHTML = todayOrders.slice(0, 10).map(o => `
                <div class="order-select ${selectedOrderId === o.id ? 'selected' : ''}" onclick="selectOrder(${o.id})">
                    <div style="display:flex;justify-content:space-between;">
                        <span>🪑 طاولة ${o.table} - ${(o.items||[]).map(i=>i.name).join(', ')}</span>
                        <span style="color:#38bdf8;">${(o.total||0).toLocaleString()} ل.س</span>
                    </div>
                    <div style="font-size:10px;color:#94a3b8;">${new Date(o.timestamp||Date.now()).toLocaleTimeString('ar-SA')}</div>
                </div>
            `).join('');
        }

        function selectOrder(id) {
            selectedOrderId = id;
            loadOrders();
            updatePreview();
        }

        function updatePreview() {
            const preview = document.getElementById('receiptPreview');
            if (!selectedOrderId) {
                preview.innerHTML = '<div class="center title">🍽️ Thana Restaurant</div><div class="center">${shopName}</div><div class="center">${shopAddr}</div><div class="center">${shopTel}</div><div class="line"></div><div class="center">اختر طلباً للمعاينة</div>';
                return;
            }
            const orders = JSON.parse(localStorage.getItem('thana_orders') || '[]');
            const order = orders.find(o => o.id === selectedOrderId);
            if (!order) return;
            const s = JSON.parse(localStorage.getItem('thana_print_settings') || '{}');
            const shopName = s.shopName || 'Thana Restaurant';
            const shopAddr = s.shopAddress || '';
            const shopTel = s.shopPhone || '';
            const footer = s.footerMsg || 'شكراً لزيارتكم 💙';
            const now = new Date();
            let itemsHtml = (order.items||[]).map(i => `${i.name} ×${i.qty||1} ........ ${((i.price||0)*(i.qty||1)).toLocaleString()}`).join('<br>');
            preview.innerHTML = `
                <div class="center title">${shopName}</div>
                <div class="center">${shopAddr}</div>
                <div class="center">${shopTel}</div>
                <div class="line"></div>
                <div class="center">${now.toLocaleDateString('ar-SA')} ${now.toLocaleTimeString('ar-SA')}</div>
                <div class="center">طاولة: ${order.table} | #${order.id.toString().slice(-4)}</div>
                <div class="line"></div>
                ${itemsHtml}
                <div class="line"></div>
                <div class="center total">الإجمالي: ${(order.total||0).toLocaleString()} ل.س</div>
                ${order.note ? `<div class="center">📝 ${order.note}</div>` : ''}
                <div class="line"></div>
                <div class="center" style="font-size:10px;">${footer}</div>
            `;
        }

        function printSelected() {
            if (!selectedOrderId) { showToast('⚠️ اختر طلباً أولاً'); return; }
            const orders = JSON.parse(localStorage.getItem('thana_orders') || '[]');
            const order = orders.find(o => o.id === selectedOrderId);
            if (!order) return;
            const copies = parseInt(document.getElementById('copyCount').value) || 1;
            const s = JSON.parse(localStorage.getItem('thana_print_settings') || '{}');
            const shopName = s.shopName || 'Thana Restaurant';
            const shopAddr = s.shopAddress || '';
            const shopTel = s.shopPhone || '';
            const footer = s.footerMsg || 'شكراً لزيارتكم 💙';
            const now = new Date();
            
            let itemsHtml = (order.items||[]).map(i => `<tr><td>${i.name} ×${i.qty||1}</td><td style="text-align:left;">${((i.price||0)*(i.qty||1)).toLocaleString()}</td></tr>`).join('');
            
            const pw = window.open('', '_blank', 'width=300,height=600');
</body></html>`);
            pw.document.close();
            setTimeout(() => { for (let i=0;i<copies;i++) pw.print(); showToast('✅ تم فتح نافذة الطباعة'); }, 500);
        }

        function printTestPage() {
            const s = JSON.parse(localStorage.getItem('thana_print_settings') || '{}');
            const shopName = s.shopName || 'Thana Restaurant';
            const now = new Date();
            const pw = window.open('', '_blank', 'width=300,height=600');
</body></html>`);
            pw.document.close();
            setTimeout(() => pw.print(), 500);
            showToast('🧪 طباعة اختبارية');
        }

        loadSettings();
        loadOrders();
    </script>
</body>
</html>
