<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thana Restaurant</title>
    <link rel="stylesheet" href="theme.css">

</head>
<body>
    <div class="app">
        <div class="glass header">
            <div class="logo">🍽️</div>
            <h1>Thana Restaurant</h1>
            <p class="subtitle">نظام إدارة ذكي 2026</p>
        </div>

        <div class="glass ai" onclick="activateAI()">
            <div class="ai-icon">🤖</div>
            <div class="ai-text">
                <b>Thana AI</b>
                <small id="aiMessage">كيف أقدر أساعدك اليوم؟</small>
            </div>
            <button class="voice-btn" onclick="event.stopPropagation();startVoice()">🎤</button>
        </div>

        <div id="alertsContainer" class="alerts"></div><div class="stats">
            <div class="stat-card"><div class="stat-num" id="freeTables">8</div><div class="stat-label">🪑 طاولات فاضية</div></div>
            <div class="stat-card"><div class="stat-num" id="activeOrders">3</div><div class="stat-label">📋 طلبات نشطة</div></div>
            <div class="stat-card"><div class="stat-num" id="todayRevenue">1,250</div><div class="stat-label">💰 مبيعات اليوم $</div></div>
            <div class="stat-card"><div class="stat-num" id="predictedBusy">18:30</div><div class="stat-label">⏰ وقت الذروة</div></div>
        </div>

        <div class="menu-grid">
            <a href="waiter.html" class="menu-card">📋<br>الطلبات<br><small id="menuActiveOrders">0 نشطة</small></a>
            <a href="kitchen.html" class="menu-card">🍳<br>المطبخ<br><small id="menuCookingOrders">0 قيد التحضير</small></a>
            <a href="staff.html" class="menu-card">📦<br>المخزون<br><small id="menuLowStock">0 أصناف ناقصة</small></a>
            <a href="staff.html" class="menu-card">👥<br>الموظفين<br><small id="staffCount">5 حاضرين</small></a>
        </div>

    </div>

    <script>if(!localStorage.getItem("thana_inventory")){localStorage.setItem("thana_inventory",JSON.stringify([{id:1,name:"دجاج",icon:"🍗",unit:"كغ",qty:25,min:5},{id:2,name:"لحم",icon:"🥩",unit:"كغ",qty:15,min:3},{id:3,name:"بطاطا",icon:"🥔",unit:"كغ",qty:30,min:5},{id:4,name:"خبز",icon:"🫓",unit:"رغيف",qty:100,min:20},{id:5,name:"بيبسي",icon:"🥤",unit:"علبة",qty:50,min:10},{id:6,name:"ثوم",icon:"🧄",unit:"كغ",qty:5,min:1},{id:7,name:"زيت",icon:"🫗",unit:"لتر",qty:20,min:5},{id:8,name:"حمص",icon:"🫘",unit:"كغ",qty:8,min:2}]))}if(!localStorage.getItem("thana_tables")){let t=[];for(let i=1;i<=15;i++)t.push({id:i,status:"free",time:null,orderCount:0});t[0].status="occupied";t[0].time=Date.now();t[2].status="occupied";t[2].time=Date.now();localStorage.setItem("thana_tables",JSON.stringify(t))}</script><script src="app.js"></script>
</body>
</html>
<nav class="bottom-nav"><a href="index.html">🏠</a><a href="waiter.html">📋</a><a href="kitchen.html">🍳</a><a href="tables.html">🪑</a><a href="staff.html">👥</a><a href="staff.html">📦</a><a href="menu.html">🍽️</a>
<a href="reports.html">📊</a><a href="settings.html">⚙️</a></nav>
