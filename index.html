<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thana Restaurant</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0b0f;font-family:'Cairo',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
        .card{background:#161820;border-radius:18px;padding:30px 20px;text-align:center;max-width:380px;width:100%;border:1px solid rgba(255,255,255,0.06)}
        h1{color:#d4a853;font-size:22px;margin:8px 0}
        p{color:#a8a49e;font-size:12px;margin-bottom:20px}
        .pin-row{display:flex;gap:8px;justify-content:center;margin:14px 0}
        .pin-row span{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,0.2)}
        .pin-row span.on{background:#d4a853;border-color:#d4a853}
        .keys{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;max-width:220px;margin:0 auto}
        .keys button{padding:14px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#fff;font-size:18px;font-weight:600;cursor:pointer;font-family:'Cairo',sans-serif}
        .keys button:active{background:rgba(212,168,83,0.3)}
        .msg{min-height:22px;font-size:14px;font-weight:600;margin:8px 0}
        .msg.bad{color:#ef4444}.msg.good{color:#10b981}
        .btns{margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.06);display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
        .btns button{padding:10px 14px;border-radius:20px;font-size:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);color:#a8a49e;cursor:pointer;font-family:'Cairo',sans-serif;font-weight:600}
        .btns button:hover{border-color:#d4a853;color:#d4a853}
        .reset{width:100%;margin-top:12px;padding:10px;border-radius:10px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#ef4444;font-weight:700;font-size:12px;cursor:pointer;font-family:'Cairo',sans-serif}
    </style>
</head>
<body>
<div class="card">
    <div style="font-size:48px">🍽️</div>
    <h1>Thana Restaurant</h1>
    <p>أدخل رمز PIN للدخول</p>

    <div class="pin-row" id="dots">
        <span></span><span></span><span></span><span></span>
    </div>
    <div class="msg" id="msg"></div>
    <div class="keys" id="keys"></div>

    <div class="btns">
        <button onclick="go('2026')">🔑 مدير (2026)</button>
        <button onclick="go('1111')">📋 نادل (1111)</button>
        <button onclick="go('2222')">🍳 مطبخ (2222)</button>
        <button onclick="go('3333')">💰 كاشير (3333)</button>
    </div>
    <button class="reset" onclick="localStorage.clear();location.reload()">🗑️ مسح البيانات وإعادة ضبط</button>
</div>

<script>
var users={
    '2026':{n:'المدير',r:'admin'},
    '1111':{n:'النادل',r:'waiter'},
    '2222':{n:'المطبخ',r:'kitchen'},
    '3333':{n:'الكاشير',r:'cashier'},
    '4444':{n:'مدير مناوب',r:'manager'}
};
var pin='';

function dots(){
    var d=document.querySelectorAll('#dots span');
    d.forEach(function(x,i){x.classList.toggle('on',i<pin.length)});
}

function go(p){pin=p;dots();setTimeout(check,200)}

function check(){
    var m=document.getElementById('msg');
    if(users[pin]){
        var u=users[pin];
        localStorage.setItem('thana_auth_session',JSON.stringify({role:u.role,userId:u.r,loginTime:new Date().toISOString()}));
        m.textContent='✅ مرحباً '+u.n+'!';
        m.className='msg good';
        setTimeout(function(){location.href='index.html'},400);
    }else{
        m.textContent='❌ PIN غلط - جرب 2026';
        m.className='msg bad';
        pin='';dots();
    }
}

function tap(k){
    document.getElementById('msg').textContent='';document.getElementById('msg').className='msg';
    if(k==='C'){pin=''}
    else if(k==='⌫'){pin=pin.slice(0,-1)}
    else if(k==='✓'){check();return}
    else{if(pin.length<4){pin+=k;if(pin.length===4)setTimeout(check,300)}}
    dots();
}

var pad=document.getElementById('keys');
'123456789C0⌫✓'.split('').forEach(function(k){
    var b=document.createElement('button');
    b.textContent=k;
    b.onclick=function(){tap(k)};
    pad.appendChild(b);
});
</script>
</body>
</html>
