<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thana Restaurant</title>
    <link rel="stylesheet" href="theme-neon.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="toast.js"></script>
    <style>
        .page{display:none}
        .page.active{display:block;animation:fadeIn 0.3s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    </style>
</head>
<body>
<nav class="thana-nav" id="mainNav"></nav>
<div id="app">
    <div class="page active" id="page-login"></div>
    <div class="page" id="page-index"></div>
    <div class="page" id="page-dashboard"></div>
    <div class="page" id="page-orders"></div>
    <div class="page" id="page-waiter"></div>
    <div class="page" id="page-kitchen"></div>
    <div class="page" id="page-tables"></div>
    <div class="page" id="page-menu"></div>
    <div class="page" id="page-inventory"></div>
    <div class="page" id="page-reports"></div>
    <div class="page" id="page-close"></div>
    <div class="page" id="page-setup"></div>
    <div class="page" id="page-pin-settings"></div>
</div>

<script src="nav-component.js"></script>
<script>
// ========== SPA Router ==========
var currentPage = 'login';
var U={'4753':'admin','1111':'waiter','2222':'kitchen','3333':'cashier','4444':'manager'};
var role = null;

function navigate(page, data) {
    document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
    var el = document.getElementById('page-' + page);
    if (el) {
        el.classList.add('active');
        currentPage = page;
        // تحميل المحتوى
        if (page === 'dashboard') loadDashboard();
        if (page === 'orders') loadOrders();
        if (page === 'kitchen') loadKitchen();
        if (page === 'waiter') loadWaiter();
        window.scrollTo(0, 0);
    }
}

// ========== Sync Engine ==========
var syncQueue = [];
var isOnline = navigator.onLine;

window.addEventListener('online', function(){ isOnline = true; processSync(); });
window.addEventListener('offline', function(){ isOnline = false; });

function atomicSave(key, data) {
    try {
        localStorage.setItem(key, JSON.stringify(data));
        if (!isOnline) {
            syncQueue.push({ key: key, data: data, time: Date.now() });
            localStorage.setItem('thana_sync_queue', JSON.stringify(syncQueue));
        }
        return true;
    } catch(e) {
        console.error('Sync error:', e);
        return false;
    }
}

function processSync() {
    syncQueue = JSON.parse(localStorage.getItem('thana_sync_queue') || '[]');
    if (syncQueue.length === 0) return;
    
    syncQueue.sort(function(a,b){ return a.time - b.time; });
    
    syncQueue.forEach(function(item) {
        localStorage.setItem(item.key, JSON.stringify(item.data));
    });
    
    syncQueue = [];
    localStorage.removeItem('thana_sync_queue');
    toast('✅ تمت مزامنة ' + syncQueue.length + ' عنصر', 'success');
}

// ========== تهيئة ==========
function init() {
    var session = JSON.parse(localStorage.getItem('thana_auth_session') || 'null');
    if (session && session.role) {
        role = session.role;
        navigate(role === 'admin' ? 'index' : role === 'waiter' ? 'waiter' : role === 'kitchen' ? 'kitchen' : role === 'cashier' ? 'orders' : 'index');
    } else {
        navigate('login');
    }
}

// ========== تحميل الصفحات ==========
function loadDashboard() {
    var el = document.getElementById('page-dashboard');
    el.innerHTML = '<div class="container"><h1 style="color:#00f0ff;text-align:center">📊 لوحة التحكم</h1><div class="card"><canvas id="salesChart" height="200"></canvas></div><div class="card"><canvas id="pieChart" height="200"></canvas></div></div>';
    setTimeout(renderCharts, 300);
}

function loadOrders() {
    var el = document.getElementById('page-orders');
    el.innerHTML = '<div class="container"><h1 style="color:#00f0ff;text-align:center">📊 الطلبات</h1><div class="card"><p style="text-align:center;color:#a8a49e">تحميل...</p></div></div>';
}

function loadKitchen() {
    var el = document.getElementById('page-kitchen');
    el.innerHTML = '<div class="container"><h1 style="color:#00f0ff;text-align:center">🍳 المطبخ</h1><button class="btn" onclick="refreshKitchen()" style="width:100%">🔄 تحديث</button><div id="kitchenOrders"></div></div>';
    refreshKitchen();
}

function loadWaiter() {
    var el = document.getElementById('page-waiter');
    el.innerHTML = '<div class="container"><h1 style="color:#00f0ff;text-align:center">📋 النادل</h1><div class="card"><p style="text-align:center;color:#a8a49e">تحميل...</p></div></div>';
}

function refreshKitchen() {
    var orders = JSON.parse(localStorage.getItem('thana_orders') || '[]');
    var today = new Date().toLocaleDateString('ar-SA');
    var todayOrders = orders.filter(function(o){ return new Date(o.timestamp||Date.now()).toLocaleDateString('ar-SA') === today && o.status !== 'done'; });
    var el = document.getElementById('kitchenOrders');
    if (!el) return;
    if (todayOrders.length === 0) { el.innerHTML = '<p style="text-align:center;color:#6b6760">لا توجد طلبات</p>'; return; }
    el.innerHTML = todayOrders.map(function(o){
        return '<div class="card" style="border-right:3px solid '+(o.status==='new'?'#f59e0b':'#38bdf8')+'"><b>#'+o.orderNumber+' 🪑 '+o.table+'</b><br>'+(o.items||[]).map(function(i){return i.name+' ×'+i.qty}).join(', ')+'<br><small>'+(o.total||0).toLocaleString()+' ل.س</small></div>';
    }).join('');
}

function renderCharts() {
    var orders = JSON.parse(localStorage.getItem('thana_orders') || '[]');
    var hourly = Array(8).fill(0);
    orders.forEach(function(o){ var h = new Date(o.timestamp).getHours() - 12; if(h>=0&&h<8) hourly[h] += o.total||0; });
    var ctx1 = document.getElementById('salesChart');
    if (ctx1) new Chart(ctx1, { type:'line', data:{ labels:['12م','1م','2م','3م','4م','5م','6م','7م'], datasets:[{ label:'مبيعات', data:hourly, borderColor:'#00f0ff', backgroundColor:'rgba(0,240,255,0.1)', fill:true }] }, options:{ plugins:{ legend:{ display:false } } } });
    
    var items = {};
    orders.forEach(function(o){ (o.items||[]).forEach(function(i){ items[i.name] = (items[i.name]||0) + (i.qty||1); }); });
    var sorted = Object.entries(items).sort(function(a,b){ return b[1]-a[1]; }).slice(0,5);
    var ctx2 = document.getElementById('pieChart');
    if (ctx2) new Chart(ctx2, { type:'bar', data:{ labels:sorted.map(function(s){return s[0]}), datasets:[{ label:'طلبات', data:sorted.map(function(s){return s[1]}), backgroundColor:'#00f0ff' }] }, options:{ plugins:{ legend:{ display:false } } } });
}

init();
</script>
</body>
</html>
