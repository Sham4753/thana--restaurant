<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المطبخ - Thana Restaurant</title>
    <link rel="stylesheet" href="theme-v2.css">
    <meta name="theme-color" content="#0a0b0f">
    <script src="nav-component.js" defer></script>
    <script src="pwa-register.js" defer></script>
    <style>
        body{padding:16px;font-family:'Cairo',sans-serif;background:#0a0b0f;color:#e8e4dd}
        .container{max-width:900px;margin:0 auto}
        .header{text-align:center;padding:10px 0}
        .header h1{font-size:26px;color:#d4a853}
        .stats{display:flex;gap:8px;justify-content:center;margin:10px 0;flex-wrap:wrap}
        .stat{background:#161820;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:10px 14px;text-align:center;min-width:70px}
        .stat .num{font-size:22px;font-weight:700}
        .stat .lbl{font-size:9px;color:#6b6760}
        .stat.pend .num{color:#f59e0b}.stat.cook .num{color:#38bdf8}.stat.done .num{color:#10b981}

        .order-card{background:#161820;border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:14px;margin-bottom:8px;border-right:4px solid #f59e0b}
        .order-card.cooking{border-right-color:#38bdf8}
        .order-card.done{border-right-color:#10b981;opacity:0.6}
        .order-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
        .order-table{font-size:16px;font-weight:700}
        .order-time{font-size:10px;color:#6b6760}
        .order-items{list-style:none}
        .order-items li{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.02);font-size:13px}
        .order-actions{display:flex;gap:5px;margin-top:8px}
        .btn{padding:7px 12px;border-radius:8px;border:none;font-weight:600;font-size:11px;cursor:pointer;font-family:'Cairo',sans-serif}
        .btn-cook{background:#f59e0b;color:#000}
        .btn-done{background:#10b981;color:#fff}
        .btn-back{background:rgba(255,255,255,0.08);color:#fff}
        .btn-refresh{background:rgba(212,168,83,0.15);color:#d4a853;border:1px solid rgba(212,168,83,0.3);display:block;width:100%;padding:10px;margin-top:8px;border-radius:10px;font-size:13px;cursor:pointer;font-family:'Cairo',sans-serif;font-weight:700}

        .empty{text-align:center;padding:30px;color:#6b6760}
    </style>
</head>
<body>
<div class="container">
<div class="header">
    <div style="font-size:40px;">🍳</div>
    <h1>شاشة المطبخ</h1>
</div>

<div class="stats">
    <div class="stat pend"><div class="num" id="pendCount">0</div><div class="lbl">جديد</div></div>
    <div class="stat cook"><div class="num" id="cookCount">0</div><div class="lbl">يطبخ</div></div>
    <div class="stat done"><div class="num" id="doneCount">0</div><div class="lbl">جاهز</div></div>
</div>

<button class="btn-refresh" onclick="loadOrders()">🔄 تحديث الطلبات الآن</button>

<div id="ordersContainer">
    <div class="empty"><div style="font-size:40px;">🍽️</div><div>لا توجد طلبات - اضغط تحديث</div></div>
</div>
</div>

<script>
function loadOrders(){
    var orders=JSON.parse(localStorage.getItem('thana_orders')||'[]');
    var today=new Date().toLocaleDateString('ar-SA');
    var todayOrders=orders.filter(function(o){
        return new Date(o.timestamp||Date.now()).toLocaleDateString('ar-SA')===today;
    });

    var sorted=[];
    todayOrders.filter(function(o){return o.status==='new'}).forEach(function(o){sorted.push(o)});
    todayOrders.filter(function(o){return o.status==='cooking'}).forEach(function(o){sorted.push(o)});
    todayOrders.filter(function(o){return o.status==='done'}).slice(-3).forEach(function(o){sorted.push(o)});

    document.getElementById('pendCount').textContent=todayOrders.filter(function(o){return o.status==='new'}).length;
    document.getElementById('cookCount').textContent=todayOrders.filter(function(o){return o.status==='cooking'}).length;
    document.getElementById('doneCount').textContent=todayOrders.filter(function(o){return o.status==='done'}).length;

    var container=document.getElementById('ordersContainer');
    if(sorted.length===0){
        container.innerHTML='<div class="empty"><div style="font-size:40px;">🍽️</div><div>لا توجد طلبات</div></div>';
        return;
    }

    container.innerHTML=sorted.map(function(o){
        var itemsHtml=(o.items||[]).map(function(i){return'<li><span>'+i.name+' ×'+(i.qty||1)+'</span></li>'}).join('');
        var isCooking=o.status==='cooking';
        var isDone=o.status==='done';
        var actionHtml='';
        if(!isDone){
            actionHtml='<div class="order-actions">';
            if(!isCooking){
                actionHtml+='<button class="btn btn-cook" onclick="startCooking('+o.id+')">🔥 بدء الطبخ</button>';
            }else{
                actionHtml+='<button class="btn btn-done" onclick="markDone('+o.id+')">✅ جاهز</button>';
            }
            actionHtml+='<button class="btn btn-back" onclick="backToNew('+o.id+')">↩️ إعادة</button></div>';
        }else{
            actionHtml='<div style="text-align:center;color:#10b981;font-size:11px;">✅ تم التقديم</div>';
        }

        return'<div class="order-card'+ (isCooking?' cooking':'') + (isDone?' done':'') +'">'+
            '<div class="order-header">'+
            '<span class="order-table">🪑 طاولة '+o.table+'</span>'+
            '<span class="order-time">'+new Date(o.timestamp||Date.now()).toLocaleTimeString('ar-SA')+'</span>'+
            '</div>'+
            '<ul class="order-items">'+itemsHtml+'</ul>'+
            (o.note?'<div style="font-size:11px;color:#f59e0b;margin-top:4px;">📝 '+o.note+'</div>':'')+
            actionHtml+
            '</div>';
    }).join('');
}

function updateOrder(id,status,extra){
    var orders=JSON.parse(localStorage.getItem('thana_orders')||'[]');
    var order=orders.find(function(o){return o.id===id});
    if(order){
        order.status=status;
        if(extra)Object.assign(order,extra);
        localStorage.setItem('thana_orders',JSON.stringify(orders));
        loadOrders();
    }
}

function startCooking(id){updateOrder(id,'cooking',{cookStart:new Date().toISOString()})}
function markDone(id){updateOrder(id,'done',{cookEnd:new Date().toISOString()})}
function backToNew(id){updateOrder(id,'new',{cookStart:null,cookEnd:null})}

// تحميل أول مرة
loadOrders();

// تحديث تلقائي كل 5 ثواني
setInterval(loadOrders, 1000);

// استماع للتغييرات
window.addEventListener('storage',function(e){
    if(e.key==='thana_orders'||e.key==='thana_new_order_notify') loadOrders();
});
</script>
</body>
</html>
