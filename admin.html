<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="theme.css">
<title>Thana Admin</title>
    <style>
        :root{--bg:#0a0a0a;--accent:#e94560;--accent2:#00a884;--text:#fff;--glass:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.1)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,sans-serif;background:linear-gradient(135deg,#0a0a0a,#1a1a2e);color:var(--text);min-height:100vh;padding:16px}
        .app{max-width:500px;margin:0 auto}
        .header{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:20px;padding:16px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
        .header-icon{font-size:2em}.header-title{font-size:1.3em;font-weight:700}
        .card{background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
        .card h3{margin-bottom:8px}
        .card p{font-size:0.85em;opacity:0.7;margin-bottom:12px}
        .btn{width:100%;padding:12px;border:none;border-radius:12px;font-size:1em;font-weight:600;cursor:pointer;margin:6px 0}
        .btn-danger{background:var(--accent);color:white}
        .btn-safe{background:var(--accent2);color:white}
        .btn-warn{background:#f5a623;color:#0a0a0a}
        .btn:active{transform:scale(0.95)}
        .pin-area{text-align:center;margin-top:20px}
        .pin-area input{width:60px;padding:12px;text-align:center;font-size:1.5em;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:12px}
        .hidden{display:none}
        .bottom-nav{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:20px;padding:12px;display:flex;justify-content:space-around;position:sticky;bottom:16px;margin-top:20px}
        .bottom-nav a{text-decoration:none;color:var(--text);text-align:center;padding:8px 12px;border-radius:12px;font-size:1em}
    </style>
</head>
<body>
    <div class="app">
        <div class="header"><div class="header-icon">🔐</div><div class="header-title">لوحة المدير</div></div>

        <!-- PIN Screen -->
        <div id="pinScreen">
            <div class="card" style="text-align:center">
                <h3>🔐 أدخل رمز المدير</h3>
                <input type="password" id="pinInput" placeholder="****" maxlength="4" onkeyup="if(this.value.length===4)checkPIN()">
            </div>
        </div>

        <!-- Admin Controls -->
        <div id="adminControls" class="hidden">
            <div class="card">
                <h3>🗑️ مسح البيانات</h3>
                <p>حذف كل الطلبات، المخزون، الهدر. لا يمكن التراجع.</p>
                <button class="btn btn-danger" onclick="clearAll()">🗑️ مسح كل البيانات</button>
            </div>
            <div class="card">
                <h3>📥 تصدير كل شيء</h3>
                <p>تحميل نسخة احتياطية من كل البيانات.</p>
                <button class="btn btn-safe" onclick="exportAll()">📥 تحميل النسخة الاحتياطية</button>
            </div>
            <div class="card">
                <h3>🔄 إعادة ضبط المصنع</h3>
                <p>مسح كل شيء وإرجاع البيانات الافتراضية.</p>
                <button class="btn btn-warn" onclick="factoryReset()">🔄 إعادة ضبط</button>
            </div>
            <div class="card">
                <h3>📊 إحصائيات</h3>
                <div id="adminStats"></div>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="index.html">🏠</a><a href="waiter.html">📋</a><a href="kitchen.html">🍳</a>
            <a href="tables.html">🪑</a><a href="staff.html">👥</a><a href="inventory.html">📦</a>
            <a href="reports.html">📊</a><a href="close.html">📆</a><a href="waste_report.html">🗑️</a>
        </nav>
    </div>

    <script>
        const ADMIN_PIN = '2026';
        const defaultPIN = localStorage.getItem('thana_admin_pin') || ADMIN_PIN;
        
        function checkPIN() {
            const input = document.getElementById('pinInput').value;
            if (input === defaultPIN) {
                document.getElementById('pinScreen').classList.add('hidden');
                document.getElementById('adminControls').classList.remove('hidden');
                showStats();
            } else {
                alert('❌ رمز غير صحيح');
                document.getElementById('pinInput').value = '';
            }
        }

        function showStats() {
            const orders = JSON.parse(localStorage.getItem('thana_kitchen_orders') || '[]');
            const staff = JSON.parse(localStorage.getItem('thana_staff') || '[]');
            const inventory = JSON.parse(localStorage.getItem('thana_inventory') || '[]');
            const waste = JSON.parse(localStorage.getItem('thana_waste') || '[]');
            const archive = JSON.parse(localStorage.getItem('thana_archive') || '[]');
            
            document.getElementById('adminStats').innerHTML = `
                <p>📋 الطلبات: ${orders.length}</p>
                <p>👥 الموظفين: ${staff.length}</p>
                <p>📦 المخزون: ${inventory.length} أصناف</p>
                <p>🗑️ الهدر: ${waste.length} سجلات</p>
                <p>📆 أرشيف الأيام: ${archive.length} يوم</p>
            `;
        }

        function clearAll() {
            if (!confirm('⚠️ متأكد من مسح كل البيانات؟ لا يمكن التراجع.')) return;
            if (!confirm('تأكيد نهائي: سيتم حذف كل شيء.')) return;
            localStorage.removeItem('thana_kitchen_orders');
            localStorage.removeItem('thana_staff');
            localStorage.removeItem('thana_inventory');
            localStorage.removeItem('thana_waste');
            localStorage.removeItem('thana_tables');
            localStorage.removeItem('thana_menu');
            localStorage.removeItem('thana_payments');
            localStorage.removeItem('thana_archive');
            alert('✅ تم مسح كل البيانات');
            showStats();
        }

        function exportAll() {
            const data = {
                orders: JSON.parse(localStorage.getItem('thana_kitchen_orders') || '[]'),
                staff: JSON.parse(localStorage.getItem('thana_staff') || '[]'),
                inventory: JSON.parse(localStorage.getItem('thana_inventory') || '[]'),
                waste: JSON.parse(localStorage.getItem('thana_waste') || '[]'),
                tables: JSON.parse(localStorage.getItem('thana_tables') || '[]'),
                menu: JSON.parse(localStorage.getItem('thana_menu') || '[]'),
                archive: JSON.parse(localStorage.getItem('thana_archive') || '[]'),
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'thana_backup_' + new Date().toISOString().split('T')[0] + '.json';
            a.click();
        }

        function factoryReset() {
            if (!confirm('⚠️ إعادة ضبط المصنع؟ سيتم مسح كل شيء وإرجاع الافتراضيات.')) return;
            localStorage.clear();
            localStorage.setItem('thana_admin_pin', ADMIN_PIN);
            alert('✅ تمت إعادة الضبط. الرجاء تحديث الصفحة.');
            location.reload();
        }
    </script>
</body>
</html>
