<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الطلبات - Thana Restaurant</title>
    <link rel="stylesheet" href="theme-v2.css">
    <script src="nav-component.js" defer></script>
    <style>
        body{padding:16px;font-family:'Cairo',sans-serif;background:#0a0b0f;color:#e8e4dd}
        .container{max-width:950px;margin:0 auto}
        .header{text-align:center;padding:12px 0}
        .header h1{font-size:24px;color:#d4a853}
        .stats{display:flex;gap:8px;justify-content:center;margin:10px 0;flex-wrap:wrap}
        .stat{background:#161820;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:10px 14px;text-align:center;min-width:70px}
        .stat .num{font-size:20px;font-weight:700}
        .stat .lbl{font-size:9px;color:#6b6760}
        .card{background:#161820;border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:14px;margin-bottom:10px}
        h3{color:#d4a853;margin-bottom:10px;font-size:15px}
        .order-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:13px;flex-wrap:wrap;gap:6px}
        .badge{padding:3px 8px;border-radius:12px;font-size:9px;font-weight:600}
        .badge-paid{background:rgba(16,185,129,0.15);color:#10b981}
        .badge-debt{background:rgba(245,158,11,0.15);color:#f59e0b}
        .badge-cancel{background:rgba(239,68,68,0.15);color:#ef4444}
        .btn{padding:6px 12px;border-radius:8px;border:none;font-weight:600;font-size:10px;cursor:pointer;font-family:'Cairo',sans-serif;margin:2px}
        .btn-paid{background:#10b981;color:#fff}
        .btn-debt{background:#f59e0b;color:#000}
        .btn-cancel{background:rgba(239,68,68,0.2);color:#ef4444}
        .btn-del{background:rgba(239,68,68,0.1);color:#ef4444}
        .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:10px 20px;border-radius:30px;font-weight:700;z-index:300;animation:td 0.4s ease,tu 0.4s ease 2s forwards}
        @keyframes td{from{opacity:0;transform:translateX(-50%) translateY(-80px)}}
        @keyframes tu{to{opacity:0;transform:translateX(-50%) translateY(-80px)}}
    </style>
</head>
<body>
<div class="container">
<div class="header"><div style="font-size:40px;">📊</div><h1>لوحة الطلبات</h1></div>

<div class="stats">
    <div class="stat"><div class="num" id="sAll" style="color:#38bdf8">0</div><div class="lbl">جديد/يطبخ</div></div>
    <div class="stat"><div class="num" id="sPaid" style="color:#10b981">0</div><div class="lbl">مدفوع</div></div>
    <div class="stat"><div class="num" id="sDebt" style="color:#f59e0b">0</div><div class="lbl">دين</div></div>
    <div class="stat"><div class="num" id="sCash" style="color:#d4a853">0</div><div class="lbl">الكاش (ل.س)</div></div>
</div>

<div class="card"><h3>🆕 طلبات نشطة</h3><div id="activeOrders"></div></div>
<div class="card"><h3>💰 الديون</h3><div id="debtOrders"></div></div>
<div class="card"><h3>✅ المدفوع اليوم</h3><div id="paidOrders"></div></div>
</div>

<script>
function GO(){return JSON.parse(localStorage.getItem('thana_orders')||'[]')}
function SO(o){localStorage.setItem('thana_orders',JSON.stringify(o))}
function GT(){return JSON.parse(localStorage.getItem('thana_tables')||'[]')}
function ST(t){localStorage.setItem('thana_tables',JSON.stringify(t))}

function renderAll(){
    var orders=GO();var today=new Date().toLocaleDateString('ar-SA');
    var all=orders.filter(function(o){return new Date(o.timestamp||Date.now()).toLocaleDateString('ar-SA')===today});
    
    var active=all.filter(function(o){return !o.paymentStatus||o.paymentStatus==='new'||o.status==='new'||o.status==='cooking'||o.status==='done'});
    var debts=all.filter(function(o){return o.paymentStatus==='debt'});
    var paid=all.filter(function(o){return o.paymentStatus==='paid'});
    
    document.getElementById('sAll').textContent=active.length;
    document.getElementById('sPaid').textContent=paid.length;
    document.getElementById('sDebt').textContent=debts.length;
    document.getElementById('sCash').textContent=paid.reduce(function(s,o){return s+(o.total||0)},0).toLocaleString();
    
    document.getElementById('activeOrders').innerHTML=renderList(active,'active');
    document.getElementById('debtOrders').innerHTML=renderList(debts,'debt');
    document.getElementById('paidOrders').innerHTML=renderList(paid,'paid');
}

function renderList(orders,type){
    if(orders.length===0)return'<div style="text-align:center;padding:14px;color:#6b6760;font-size:12px;">لا توجد طلبات</div>';
    return orders.reverse().map(function(o){
        var items=(o.items||[]).map(function(i){return i.name+'×'+(i.qty||1)}).join('، ');
        var tableInfo=o.table==='safari'?'🛍️ سفري':'🪑 طاولة '+o.table;
        var badge='';
        if(o.paymentStatus==='paid')badge='<span class="badge badge-paid">✅ مدفوع</span>';
        else if(o.paymentStatus==='debt')badge='<span class="badge badge-debt">💰 دين</span>';
        else if(o.status==='new')badge='<span class="badge badge-debt">🆕 جديد</span>';
        else if(o.status==='cooking')badge='<span class="badge badge-debt">🔥 يطبخ</span>';
        else badge='<span class="badge badge-paid">✅ جاهز</span>';
        
        var actions='';
        if(type==='active'){
            actions+='<button class="btn btn-paid" onclick="markPaid('+o.id+')">💵 دفع</button>';
            actions+='<button class="btn btn-debt" onclick="markDebt('+o.id+')">📝 دين</button>';
            actions+='<button class="btn btn-cancel" onclick="markCancel('+o.id+')">❌ إلغاء</button>';
        }
        if(type==='debt'){
            actions+='<button class="btn btn-paid" onclick="markPaid('+o.id+')">💵 سدد الدين</button>';
            actions+='<button class="btn btn-cancel" onclick="markCancel('+o.id+')">❌ إلغاء</button>';
        }
        actions+='<button class="btn btn-del" onclick="delOrder('+o.id+')">🗑️</button>';
        
        return'<div class="order-row"><div><b>'+tableInfo+'</b> '+badge+'<br><span style="font-size:11px;color:#a8a49e;">'+items+'</span></div><div style="text-align:left"><b style="color:#d4a853;">'+(o.total||0).toLocaleString()+' ل.س</b><br><span style="font-size:10px;color:#6b6760;">'+new Date(o.timestamp||Date.now()).toLocaleTimeString('ar-SA')+'</span></div><div>'+actions+'</div></div>';
    }).join('');
}

function markPaid(id){
    var orders=GO();var o=orders.find(function(x){return x.id===id});
    if(o){
        o.paymentStatus='paid';o.paidAt=new Date().toISOString();
        SO(orders);
        // تفريغ الطاولة
        if(o.table&&o.table!=='safari'){freeTable(o.table)}
        // إضافة للكاش
        addToCash(o);
        renderAll();showToast('💵 تم الدفع - الطاولة '+o.table+' فضيت');
    }
}

function markDebt(id){
    var orders=GO();var o=orders.find(function(x){return x.id===id});
    if(o){o.paymentStatus='debt';SO(orders);renderAll();showToast('📝 سجل دين')}
}

function markCancel(id){
    var orders=GO();var o=orders.find(function(x){return x.id===id});
    if(o){
        o.paymentStatus='cancelled';SO(orders);
        if(o.table&&o.table!=='safari'){freeTable(o.table)}
        renderAll();showToast('❌ ألغي الطلب');
    }
}

function delOrder(id){
    if(!confirm('حذف الطلب نهائياً؟'))return;
    var orders=GO();var o=orders.find(function(x){return x.id===id});
    if(o&&o.table&&o.table!=='safari'){freeTable(o.table)}
    orders=orders.filter(function(x){return x.id!==id});
    SO(orders);renderAll();showToast('🗑️ تم الحذف');
}

function freeTable(tableId){
    var tables=GT();
    var t=tables.find(function(x){return x.id==tableId});
    if(t){t.status='free';ST(tables)}
}

function addToCash(order){
    var cash=JSON.parse(localStorage.getItem('thana_cash')||'[]');
    cash.push({id:order.id,table:order.table,total:order.total,time:new Date().toISOString()});
    localStorage.setItem('thana_cash',JSON.stringify(cash));
}

function showToast(m){
    var t=document.querySelector('.toast');if(t)t.remove();
    t=document.createElement('div');t.className='toast';t.textContent=m;
    document.body.appendChild(t);setTimeout(function(){t.remove()},2000);
}

renderAll();
</script>
</body>
</html>
