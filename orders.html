<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الطلبات - Thana</title>
    <link rel="stylesheet" href="theme-neon.css?v=2.1">
<script src="auto-backup.js"></script>
<script src="toast.js"></script>
<script src="license-check.js"></script>
<script src="loyalty.js"></script>
<script src="predictive-ai.js"></script>
<script src="state.js"></script>
<script src="nav-component.js?v=2.1" defer></script>
    <style>
        body{padding:16px;font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text)}
        .container{max-width:950px;margin:0 auto}
        .header{text-align:center;padding:12px 0}
        .header h1{font-size:24px;color:var(--gold)}
        .stats{display:flex;gap:8px;justify-content:center;margin:10px 0;flex-wrap:wrap}
        .stat{background:var(--bg-card);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:10px 14px;text-align:center;min-width:70px}
        .stat .num{font-size:20px;font-weight:700}
        .stat .lbl{font-size:9px;color:var(--text-muted)}
        .card{background:var(--bg-card);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:14px;margin-bottom:10px}
        h3{color:var(--gold);margin-bottom:10px;font-size:15px}
        .order-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:13px;flex-wrap:wrap;gap:6px}
        .badge{padding:3px 8px;border-radius:12px;font-size:9px;font-weight:600}
        .badge-paid{background:rgba(16,185,129,0.15);color:var(--success)}
        .badge-debt{background:rgba(245,158,11,0.15);color:var(--warning)}
        .badge-cancel{background:rgba(239,68,68,0.15);color:var(--danger)}
        .btn{padding:6px 12px;border-radius:8px;border:none;font-weight:600;font-size:10px;cursor:pointer;font-family:'Cairo',sans-serif;margin:2px}
        .btn-paid{background:var(--success-color);color:#fff}
        .btn-debt{background:#f59e0b;color:#000}
        .btn-cancel{background:rgba(239,68,68,0.2);color:var(--danger)}
        .btn-del{background:rgba(239,68,68,0.1);color:var(--danger)}
        .btn-print{background:#38bdf8;color:#fff}
        .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--success-color);color:#fff;padding:10px 20px;border-radius:30px;font-weight:700;z-index:300}
    </style>
</head>
<body>
<div class="container">
<div class="header"><div style="font-size:40px">📊</div><h1>لوحة الطلبات</h1></div>

<div class="stats">
    <div class="stat"><div class="num" id="sAll" style="color:#38bdf8">0</div><div class="lbl">نشط</div></div>
    <div class="stat"><div class="num" id="sPaid" style="color:var(--success)">0</div><div class="lbl">مدفوع</div></div>
    <div class="stat"><div class="num" id="sDebt" style="color:var(--warning)">0</div><div class="lbl">دين</div></div>
    <div class="stat"><div class="num" id="sCash" style="color:var(--gold)">0</div><div class="lbl">الكاش</div></div>
</div>

<div class="card"><h3>🆕 نشط</h3><div id="activeOrders"></div></div>
<div class="card"><h3>💰 ديون</h3><div id="debtOrders"></div></div>
<div class="card"><h3>✅ مدفوع اليوم</h3><div id="paidOrders"></div></div>
</div>

<script src="channel.js"></script>
<script>
function GO(){return JSON.parse(localStorage.getItem('thana_orders')||'[]')}
function SO(o){localStorage.setItem('thana_orders',JSON.stringify(o))}
function GT(){return JSON.parse(localStorage.getItem('thana_tables')||'[]')}
function ST(t){localStorage.setItem('thana_tables',JSON.stringify(t))}

function renderAll(){
    var orders=GO();var today=new Date().toLocaleDateString('ar-SA');
    var all=orders.filter(function(o){return new Date(o.timestamp||Date.now()).toLocaleDateString('ar-SA')===today});
    var active=all.filter(function(o){return !o.paymentStatus||o.paymentStatus==='new'||o.status==='new'||o.status==='cooking'||o.status==='done'});
    var debts=all.filter(function(o){return o.paymentStatus==='debt'});
    var paid=all.filter(function(o){return o.paymentStatus==='paid'});
    
    document.getElementById('sAll').textContent=active.length;
    document.getElementById('sPaid').textContent=paid.length;
    document.getElementById('sDebt').textContent=debts.length;
    document.getElementById('sCash').textContent=paid.reduce(function(s,o){return s+(o.total||0)},0).toLocaleString();
    
    document.getElementById('activeOrders').innerHTML=renderList(active,'active');
    document.getElementById('debtOrders').innerHTML=renderList(debts,'debt');
    document.getElementById('paidOrders').innerHTML=renderList(paid,'paid');
}

function renderList(orders,type){
    if(orders.length===0)return'<div style="text-align:center;padding:14px;color:var(--text-muted);font-size:12px;">لا توجد طلبات</div>';
    return orders.reverse().map(function(o){
        var num = o.orderNumber || o.id.toString().slice(-4);
        var items=(o.items||[]).map(function(i){return i.name+'×'+(i.qty||1)}).join('، ');
        var tableInfo=o.table==='safari'?'🛍️ سفري':'🪑 طاولة '+o.table;
        var badge='';
        if(o.paymentStatus==='paid')badge='<span class="badge badge-paid">✅ مدفوع</span>';
        else if(o.paymentStatus==='debt')badge='<span class="badge badge-debt">💰 دين</span>';
        else if(o.status==='new')badge='<span class="badge badge-debt">🆕 جديد</span>';
        else if(o.status==='cooking')badge='<span class="badge badge-debt">🔥 يطبخ</span>';
        else badge='<span class="badge badge-paid">✅ جاهز</span>';
        
        var actions='';
        if(type==='active'){
            actions+='<button class="btn btn-print" onclick="quickPrint('+o.id+')">🖨️</button>';
            actions+='<button class="btn btn-paid" onclick="markPaid('+o.id+')">💵 دفع</button>';
            actions+='<button class="btn btn-debt" onclick="markDebt('+o.id+')">📝 دين</button>';
            actions+='<button class="btn btn-cancel" onclick="markCancel('+o.id+')">❌</button>';
        }
        if(type==='debt'){
            actions+='<button class="btn btn-paid" onclick="markPaid('+o.id+')">💵 سدد</button>';
            actions+='<button class="btn btn-cancel" onclick="markCancel('+o.id+')">❌</button>';
        }
        actions+='<button class="btn btn-del" onclick="delOrder('+o.id+')">🗑️</button>';
        
        return'<div class="order-row"><div><b>#'+num+' '+tableInfo+'</b> '+badge+'<br><span style="font-size:11px;color:var(--text-secondary);">'+items+'</span></div><div style="text-align:left"><b style="color:var(--gold);">'+(o.total||0).toLocaleString()+' ل.س</b><br><span style="font-size:10px;color:var(--text-muted);">'+new Date(o.timestamp||Date.now()).toLocaleTimeString('ar-SA')+'</span></div><div>'+actions+'</div></div>';
    }).join('');
}

function quickPrint(id){
    var o=GO().find(function(x){return x.id===id});if(!o)return;
    var s=JSON.parse(localStorage.getItem("thana_shop_settings")||"{}");
    var pw=window.open("","_blank","width=300,height=400");
    pw.document.write("<html dir=rtl><head><meta charset=UTF-8><style>body{font-family:Courier New,monospace;font-size:11px;width:54mm;margin:0 auto;text-align:center}hr{border:dashed 1px #ccc}h2{margin:4px 0}.total{font-size:15px;font-weight:bold}</style></head><body><h2>"+(s.name||"Thana")+"</h2><p>"+new Date().toLocaleString("ar-SA")+"</p><hr><p>طلب #"+o.orderNumber+"</p><p>"+o.table+"</p><hr>"+(o.items||[]).map(function(i){return i.name+" x"+i.qty}).join("<br>")+"<hr><p class=total>"+(o.total||0).toLocaleString()+" ل.س</p><hr><p>شكراً</p></body></html>");
    pw.document.close();setTimeout(function(){pw.print()},500);
}

function markPaid(id){
    var o=GO().find(function(x){return x.id===id});
    if(o){o.paymentStatus='paid';o.paidAt=new Date().toISOString();SO(GO());
        if(o.table&&o.table!=='safari'){var t=GT().find(function(x){return x.id==o.table});if(t){t.status='free';ST(GT())}}
        var cash=JSON.parse(localStorage.getItem('thana_cash')||'[]');cash.push({id:o.id,table:o.table,total:o.total,time:new Date().toISOString()});localStorage.setItem('thana_cash',JSON.stringify(cash));
        renderAll();showToast('💵 تم الدفع');
    }
}
function markDebt(id){var o=GO().find(function(x){return x.id===id});if(o){o.paymentStatus='debt';SO(GO());renderAll();showToast('📝 دين')}}
function markCancel(id){var o=GO().find(function(x){return x.id===id});if(o){o.paymentStatus='cancelled';SO(GO());if(o.table&&o.table!=='safari'){var t=GT().find(function(x){return x.id==o.table});if(t){t.status='free';ST(GT())}}renderAll();showToast('❌ ألغي')}}
function delOrder(id){if(!confirm('حذف؟'))return;var o=GO().find(function(x){return x.id===id});if(o&&o.table&&o.table!=='safari'){var t=GT().find(function(x){return x.id==o.table});if(t){t.status='free';ST(GT())}}var ord=GO().filter(function(x){return x.id!==id});SO(ord);renderAll();showToast('🗑️ حذف')}

function showToast(m){var t=document.querySelector('.toast');if(t)t.remove();t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove()},2000)}
renderAll();
</script>
</body>
</html>
