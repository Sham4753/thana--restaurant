<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <link rel="stylesheet" href="theme-neon.css?v=2.1">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thana Tables</title>
    <link rel="stylesheet" href="theme-neon.css">
    <style>
        .legend{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
        .legend-item{background:var(--glass);border:1px solid var(--border);border-radius:30px;padding:6px 12px;font-size:0.7em;display:flex;align-items:center;gap:6px}
        .dot{width:10px;height:10px;border-radius:50%}.dot.free{background:#00a884}.dot.occupied{background:#e94560}.dot.waiting{background:#f5a623}.dot.reserved{background:#3a86ff}
        .table-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
        .table-card{background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:16px;text-align:center;cursor:pointer;transition:all 0.3s;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
        .table-card:active{transform:scale(0.95)}.table-card.free{border-color:#00a884}.table-card.occupied{border-color:#e94560;animation:busyPulse 2s infinite}.table-card.waiting{border-color:#f5a623;animation:waitPulse 1.5s infinite}
        @keyframes busyPulse{0%,100%{box-shadow:0 0 10px rgba(233,68,96,0.2)}50%{box-shadow:0 0 20px rgba(233,68,96,0.5)}}
        @keyframes waitPulse{0%,100%{box-shadow:0 0 10px rgba(245,166,35,0.2)}50%{box-shadow:0 0 20px rgba(245,166,35,0.5)}}
        .table-num{font-size:2em;font-weight:700}.table-status{font-size:0.7em;opacity:0.8;margin-top:4px}
        .modal-content{background:var(--bg-main);border:1px solid var(--border);border-radius:20px;padding:24px;width:90%;max-width:350px;text-align:center}
    </style>
<script src="state.js"></script>
<script src="nav-component.js?v=2.1" defer></script>
</head>
<body>
    <div class="app">
        <div class="header"><div class="header-icon">🪑</div><div class="header-title">إدارة الطاولات</div></div>
        <div class="legend">
            <div class="legend-item"><div class="dot free"></div>فاضية</div>
            <div class="legend-item"><div class="dot occupied"></div>مشغولة</div>
            <div class="legend-item"><div class="dot waiting"></div>انتظار حساب</div>
            <div class="legend-item"><div class="dot reserved"></div>محجوزة</div>
        </div>
        <div class="table-grid" id="tableGrid"></div>
        <div class="modal" id="tableModal">
            <div class="modal-content">
                <h3 id="modalTitle">طاولة 1</h3>
                <button class="btn btn-danger" onclick="changeStatus('occupied')">🔴 مشغولة</button>
                <button class="btn" style="background:#f5a623;color:#0a0a0a;width:100%" onclick="changeStatus('waiting')">🟡 انتظار حساب</button>
                <button class="btn btn-success" onclick="changeStatus('free')">🟢 فاضية</button>
                <button class="btn btn-ghost" onclick="document.getElementById('tableModal').style.display='none'">✕ إغلاق</button>
            </div>
        </div>
    </div>
    <script>
        let tables=JSON.parse(localStorage.getItem('thana_tables')||'null');
        if(!tables||tables.length===0){tables=[];for(let i=1;i<=15;i++)tables.push({id:i,status:'free',time:null});save()}
        let selectedTable=null;
        function save(){localStorage.setItem('thana_tables',JSON.stringify(tables))}
        function render(){
            document.getElementById('tableGrid').innerHTML=tables.map(t=>{
                const mins=t.time?Math.floor((Date.now()-t.time)/60000):0;
                const st={free:'فاضية',occupied:'مشغولة',waiting:'انتظار حساب',reserved:'محجوزة'};
                return`<div class="table-card ${t.status}" onclick="openModal(${t.id})"><div class="table-num">${t.id}</div><div class="table-status">${st[t.status]}</div>${mins>0?`<div style="font-size:0.6em;opacity:0.5">⏱ ${mins}د</div>`:''}</div>`;
            }).join('');
        }
        function openModal(id){selectedTable=id;document.getElementById('modalTitle').textContent='🪑 طاولة '+id;document.getElementById('tableModal').style.display='flex'}
        function changeStatus(s){if(!selectedTable)return;const t=tables.find(t=>t.id===selectedTable);t.status=s;t.time=s!=='free'?Date.now():null;save();render();document.getElementById('tableModal').style.display='none'}
        render();setInterval(render,10000);
    </script>
</body>
</html>
